    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        /* Configurações Base */
        :root {
            --accent-color: #B9314F;
            --bg-dark: #0b0b0b;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #e6e6e6;
            font-family: 'Inter', system-ui, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(185, 49, 79, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(20, 20, 20, 1), transparent 40%);
            min-height: 100vh;
        }

        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        
        /* Painéis translúcidos */
        .glass-panel {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Cards estilo Xbox */
        .task-card {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
        }
        .task-card:hover {
            transform: translateY(-4px);
            background: rgba(40, 40, 40, 0.6);
            border-color: rgba(185, 49, 79, 0.3);
            box-shadow: 0 12px 24px -5px rgba(0, 0, 0, 0.6), 0 0 15px rgba(185, 49, 79, 0.1);
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }

        /* Sidebar retrátil */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            transform: translateX(0); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 50;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .main-content { margin-left: 80px; transition: margin-left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .main-content.sidebar-hidden { margin-left: 0; }

        /* Pill Buttons (Abas) */
        .filter-btn {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            padding: 10px 22px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            outline: none;
        }
        .filter-btn:hover {
            background: rgba(50, 50, 50, 0.8);
            color: white;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .filter-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: rgba(185, 49, 79, 0.6);
            box-shadow: 0 0 20px rgba(185, 49, 79, 0.5), inset 0 0 10px rgba(0,0,0,0.2);
            transform: scale(1.05);
        }

        /* Animações do Pop-up (Toast) */
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOutUp {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
        .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .toast-exit { animation: fadeOutUp 0.3s ease-in forwards; }
    </style>
</head>

<script>
    lucide.createIcons();
    
    // Toggle Sidebar
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    const toggleBtn = document.getElementById('toggle-sidebar');
    
    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
        mainContent.classList.toggle('sidebar-hidden');
    });

    // Dropdown Logic
    window.toggleMoreOptions = (event) => {
        event.stopPropagation();
        document.getElementById('more-options-dropdown').classList.toggle('hidden');
    }

    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('more-options-dropdown');
        const btn = document.getElementById('more-options-btn');
        if (dropdown && !dropdown.contains(e.target) && !btn.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });

    // Função Global de Toasts (Pop-ups)
    window.showToast = (message, type = 'success') => {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        
        let styleClasses = '';
        let iconName = '';

        if (type === 'success') {
            styleClasses = 'bg-green-500/20 border-green-500/30 text-green-400';
            iconName = 'check-circle';
        } else if (type === 'error') {
            styleClasses = 'bg-red-500/20 border-red-500/30 text-red-400';
            iconName = 'alert-circle';
        } else if (type === 'warning') {
            styleClasses = 'bg-yellow-500/20 border-yellow-500/30 text-yellow-400';
            iconName = 'alert-triangle';
        }

        toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-xl border backdrop-blur-md shadow-2xl toast-enter pointer-events-auto ${styleClasses}`;
        toast.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i> <span class="font-bold text-sm">${message}</span>`;

        container.appendChild(toast);
        lucide.createIcons({ root: toast });

        // Remove após 3.5 segundos
        setTimeout(() => {
            toast.classList.remove('toast-enter');
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    };
</script>

<!-- FIRESTORE + CLASSIFICAÇÃO -->
<script type="module">
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsbiLPBOda119Qr6Ji69j8TZLpiFixBWI",
        authDomain: "list-games-9bddd.firebaseapp.com",
        projectId: "list-games-9bddd",
        storageBucket: "list-games-9bddd.firebasestorage.app",
        messagingSenderId: "756898313156",
        appId: "1:756898313156:web:9bc660d0a2f4cd07882a91",
        measurementId: "G-GLM50YVLXP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const contentArea = document.getElementById("classifications-content");
    const viewButtons = document.querySelectorAll(".view-btn");
    let allAnimes =[];
    let currentView = "detalhada";
    let lastOpenedSeason = null;

    document.getElementById('logout-btn').onclick = () => {
        if (auth.currentUser) {
            localStorage.removeItem(`animes_${auth.currentUser.uid}`);
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        } else {
            window.location.href = 'index.html';
        }
    };

    const views = {
        detalhada() {
            const sorted = [...allAnimes].sort((a,b) => b.NOTA_F - a.NOTA_F);

            const html = sorted.map((anime, index) => `
                <div class="task-card flex items-stretch gap-4 mb-4 p-3 sm:p-4 rounded-2xl cursor-pointer hover:-translate-y-1 transition-transform group" onclick="showAnime(${index})">
                    <div class="relative w-20 h-28 shrink-0 rounded-xl overflow-hidden border border-white/10 bg-black/50">
                        <img src="${anime.IMAGEM || 'https://via.placeholder.com/150x200?text=Sem+Img'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="${anime.NOME}" onerror="this.src='https://via.placeholder.com/150x200?text=Sem+Img'">
                        <div class="absolute top-0 left-0 bg-accent text-white text-[10px] font-black px-2 py-1 rounded-br-xl shadow-lg border-b border-r border-white/20">${index + 1}</div>
                    </div>

                    <div class="flex-1 min-w-0 flex flex-col justify-center text-left">
                        <h3 class="font-bold text-lg text-white truncate mb-2" title="${anime.NOME}">${anime.NOME}</h3>
                        <div class="flex items-center gap-2.5 text-xs text-gray-400">
                            <span class="bg-black/50 px-2.5 py-1 rounded-lg border border-white/10 font-mono text-accent font-black shadow-inner shadow-black">
                                ${Number(anime.NOTA_F).toFixed(2)}
                            </span>
                            <div class="w-px h-4 bg-white/10"></div>
                            <span class="truncate font-semibold tracking-wide">${anime.ESTILO || "Anime"} • ${anime.ANO || "?"}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-center pl-2">
                        <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600 group-hover:text-accent transition-colors"></i>
                    </div>
                </div>
            `).join("");

            contentArea.innerHTML = html;
            lucide.createIcons();
        },
        
        lista() {
            const sorted = [...allAnimes].sort((a,b) => b.NOTA_F - a.NOTA_F);

            const html = sorted.map((anime, index) => `
                <div class="flex items-center justify-between p-3.5 mb-2 bg-black/40 border border-white/5 rounded-xl cursor-pointer hover:bg-white/5 hover:border-white/10 transition-all group" onclick="showAnime(${index})">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="text-accent font-black text-sm w-7 text-right">${index + 1}.</span>
                        <span class="font-bold text-gray-300 group-hover:text-white truncate transition-colors text-left">${anime.NOME}</span>
                    </div>
                    <span class="font-mono text-sm font-bold text-accent bg-accent/10 border border-accent/20 px-2.5 py-1 rounded-lg shrink-0 shadow-sm">${Number(anime.NOTA_F).toFixed(2)}</span>
                </div>
            `).join("");

            contentArea.innerHTML = html;
            lucide.createIcons();
        },
        
        ano() {
            if (!allAnimes.length) return;

            let searchHTML = `
                <div class="w-full mb-6 relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                    <input id="search-season-input" type="text" placeholder="Pesquisar temporada..." class="w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 rounded-xl text-white placeholder-gray-500 font-semibold focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all shadow-inner shadow-black/50" />
                </div>
            `;

            const grouped = {};

            allAnimes.forEach(anime => {
                const ano = anime.ANO;
                const tempStr = anime.TEMPORADA || "";
                let seasonName = "Outro";

                if (tempStr.includes("Inverno")) seasonName = "Inverno";
                else if (tempStr.includes("Primavera")) seasonName = "Primavera";
                else if (tempStr.includes("Verão")) seasonName = "Verão";
                else if (tempStr.includes("Outono")) seasonName = "Outono";

                const groupKey = (seasonName !== "Outro" && ano) ? `${seasonName} ${ano}` : "Outro";

                if (!grouped[groupKey]) grouped[groupKey] = { total: 0, count: 0 };
                grouped[groupKey].total += anime.NOTA_F;
                grouped[groupKey].count++;
            });

            const ranked = Object.entries(grouped)
                .map(([nome, info]) => ({ nome, media: info.total / info.count, qtd: info.count }))
                .sort((a, b) => b.media - a.media);

            const renderRanked = (list) => list.map((t, index) => `
                <div class="task-card flex items-center justify-between p-4 mb-3 rounded-2xl cursor-pointer hover:-translate-y-1 transition-transform group" onclick="showSeason('${t.nome}')">
                    <div class="flex items-center gap-4">
                        <span class="text-accent font-black text-lg w-7 text-right">${index + 1}.</span>
                        <div class="flex flex-col text-left">
                            <span class="font-bold text-white text-base">${t.nome}</span>
                            <span class="text-xs text-gray-400 font-semibold flex items-center gap-1 mt-0.5"><i data-lucide="tv" class="w-3 h-3 text-accent"></i> ${t.qtd} animes</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-mono text-sm font-bold text-accent bg-accent/10 border border-accent/20 px-3 py-1.5 rounded-xl shadow-sm">${t.media.toFixed(2)}</span>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600 group-hover:text-accent transition-colors hidden sm:block"></i>
                    </div>
                </div>
            `).join("");

            contentArea.innerHTML = `
                ${searchHTML}
                <div id="season-list">${renderRanked(ranked)}</div>
            `;
            lucide.createIcons();

            const searchInput = document.getElementById("search-season-input");
            const listContainer = document.getElementById("season-list");

            searchInput.addEventListener("input", () => {
                const text = searchInput.value.toLowerCase().trim();
                const filtered = ranked.filter(s => s.nome.toLowerCase().includes(text));
                listContainer.innerHTML = filtered.length > 0 ? renderRanked(filtered) : `<div class="p-8 border border-white/5 border-dashed rounded-2xl mt-4"><i data-lucide="search-x" class="w-8 h-8 text-gray-600 mx-auto mb-3"></i><p class="text-gray-400 font-semibold text-sm">Nenhuma temporada encontrada.</p></div>`;
                lucide.createIcons();
            });
        },
    };

    function switchView(view) {
        currentView = view;
        window.currentView = view;
        
        if (view !== 'ano') lastOpenedSeason = null;
        
        viewButtons.forEach(btn => btn.classList.remove("active"));
        document.querySelector(`[data-view="${view}"]`).classList.add("active");
        
        views[view]();
    }

    function showAnime(index) {
        const sorted = [...allAnimes].sort((a,b) => b.NOTA_F - a.NOTA_F);
        const anime = sorted[index];

        let backAction = `window.switchView('${currentView}')`;
        if (currentView === 'ano' && lastOpenedSeason) backAction = `window.showSeason('${lastOpenedSeason}')`;

        const defaultImg = 'https://via.placeholder.com/300x450?text=Sem+Imagem';

        contentArea.innerHTML = `
            <div class="task-card max-w-md mx-auto rounded-3xl overflow-hidden border border-white/10 relative shadow-2xl animate-in slide-in-from-bottom-5 duration-300">
                <button onclick="${backAction}" class="absolute top-4 left-4 z-[20] w-10 h-10 flex items-center justify-center bg-black/60 backdrop-blur-md rounded-full text-white hover:bg-accent hover:scale-110 transition-all border border-white/10 shadow-lg">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>

                <!-- Área da Imagem Blur Background -->
                <div class="relative w-full aspect-[4/3] bg-[#0b0b0b]">
                    <img src="${anime.IMAGEM || defaultImg}" class="absolute inset-0 w-full h-full object-cover opacity-30 blur-md">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#151515] via-[#151515]/60 to-transparent"></div>
                    
                    <div class="absolute inset-x-0 bottom-[-15%] flex justify-center z-10">
                        <img src="${anime.IMAGEM || defaultImg}" class="w-32 h-48 object-cover rounded-xl border-2 border-[#2a2a2a] shadow-2xl">
                    </div>
                </div>

                <div class="pt-20 pb-6 px-6 text-center">
                    <h2 class="text-2xl font-bold text-white mb-6 leading-tight drop-shadow-md">${anime.NOME}</h2>
                    
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="bg-black/40 p-3.5 rounded-xl border border-white/5 flex flex-col justify-center items-center">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1 tracking-wider">Nota Final</span>
                            <span class="text-accent font-mono font-black text-xl">${Number(anime.NOTA_F).toFixed(2)}</span>
                        </div>
                        <div class="bg-black/40 p-3.5 rounded-xl border border-white/5 flex flex-col justify-center items-center">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1 tracking-wider">Nota MAL</span>
                            <span class="text-white font-mono font-bold text-lg">${anime.N_MAL || "-"}</span>
                        </div>
                        <div class="bg-black/40 p-3.5 rounded-xl border border-white/5 flex flex-col justify-center items-center">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1 tracking-wider">Estrelas</span>
                            <span class="text-yellow-400 font-bold text-lg drop-shadow-[0_0_8px_rgba(250,204,21,0.4)]">${anime.STARS || "-"}</span>
                        </div>
                        <div class="bg-black/40 p-3.5 rounded-xl border border-white/5 flex flex-col justify-center items-center text-center">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold mb-1 tracking-wider">Lançamento</span>
                            <span class="text-gray-200 font-semibold text-xs leading-tight">${anime.TEMPORADA || "-"} <br> ${anime.ANO || ""}</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    window.showAnime = showAnime;
    window.currentView = currentView;
    window.switchView = switchView;

    window.showSeason = function(seasonName) {
        lastOpenedSeason = seasonName;

        const animesDaTemporada = allAnimes.filter(a => {
            const year = a.ANO;
            const temp = a.TEMPORADA || "";
            if (seasonName === "Outro") {
                return (!year || !temp || (!temp.includes("Inverno") && !temp.includes("Primavera") && !temp.includes("Verão") && !temp.includes("Outono")));
            }
            return `${temp.split(" (")[0]} ${year}` === seasonName;
        });

        animesDaTemporada.sort((a, b) => b.NOTA_F - a.NOTA_F);

        window.showAnimeByNum = function(num) {
            const globalSorted = [...allAnimes].sort((a, b) => b.NOTA_F - a.NOTA_F);
            const targetIndex = globalSorted.findIndex(a => Number(a.Num) === Number(num));
            if (targetIndex !== -1) showAnime(targetIndex);
            else window.showToast("Anime não encontrado.", "error");
        };

        const html = `
            <div class="flex items-center gap-4 mb-5 pb-3 border-b border-white/10">
                <button onclick="window.switchView('ano')" class="p-2 bg-white/5 hover:bg-white/10 rounded-full text-white transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <div class="text-left flex-1">
                    <h2 class="text-xl font-bold text-white tracking-wide">${seasonName}</h2>
                </div>
            </div>

            <div class="space-y-2">
                ${animesDaTemporada.map((anime, index) => `
                <div class="flex items-center justify-between p-3.5 bg-black/40 border border-white/5 rounded-xl cursor-pointer hover:bg-white/5 hover:border-white/10 transition-all group" onclick="showAnimeByNum(${anime.Num})">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="font-bold text-accent w-6 text-right">${index + 1}.</span>
                        <span class="font-bold text-gray-300 group-hover:text-white truncate transition-colors text-left">${anime.NOME}</span>
                    </div>
                    <span class="font-mono text-sm font-bold text-accent bg-accent/10 px-2.5 py-1 rounded-lg shrink-0 shadow-sm">${Number(anime.NOTA_F).toFixed(2)}</span>
                </div>
                `).join("")}
            </div>
        `;

        contentArea.innerHTML = html;
        lucide.createIcons();
    };

    async function loadAll() {
        const user = auth.currentUser;
        if (!user) return;

        const cacheKey = `animes_${user.uid}`;
        const cachedData = localStorage.getItem(cacheKey);

        if (cachedData) {
            allAnimes = JSON.parse(cachedData);
            switchView("detalhada");
        } else {
            try {
                const ref = collection(db, "users", user.uid, "animes");
                const docs = await getDocs(ref);
                allAnimes = docs.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                localStorage.setItem(cacheKey, JSON.stringify(allAnimes));
                switchView("detalhada");
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                window.showToast("Erro ao carregar dados do banco.", "error");
            }
        }
    }

    onAuthStateChanged(auth, (user) => {
        const userEmailEl = document.getElementById("user-email");
        if (user) {
            if (userEmailEl) userEmailEl.textContent = user.email;
            loadAll();
        } else {
            window.location.href = "index.html";
        }
    });

    viewButtons.forEach(btn => {
        btn.addEventListener("click", () => switchView(btn.dataset.view));
    });
</script>

</body>
</html>
