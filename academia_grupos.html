  <style>
      /* Configurações Base */
      :root {
          --accent-color: #B9314F;
          --bg-dark: #0b0b0b;
          --bg-panel: #151515;
      }
      body {
          background-color: var(--bg-dark);
          color: #e6e6e6;
          font-family: 'Inter', system-ui, sans-serif;
          /* Gradiente de fundo sutil estilo Xbox */
          background-image: radial-gradient(circle at top right, rgba(185, 49, 79, 0.1), transparent 40%),
                            radial-gradient(circle at bottom left, rgba(20, 20, 20, 1), transparent 40%);
          min-height: 100vh;
      }

      /* Utilitários de Estilo */
      .text-accent { color: var(--accent-color); }
      .bg-accent { background-color: var(--accent-color); }
      
      /* Painéis translúcidos */
      .glass-panel {
          background: rgba(21, 21, 21, 0.8);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Cards com efeito Xbox */
      .task-card {
          background: rgba(30, 30, 30, 0.4);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.05);
          transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
          box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
      }
      .task-card:hover {
          transform: translateY(-4px);
          background: rgba(40, 40, 40, 0.6);
          border-color: rgba(185, 49, 79, 0.3);
          box-shadow: 0 12px 24px -5px rgba(0, 0, 0, 0.6), 0 0 15px rgba(185, 49, 79, 0.1);
      }

      /* Inputs estilo Xbox */
      input, select, textarea {
          background: rgba(0, 0, 0, 0.4);
          border: 2px solid rgba(255, 255, 255, 0.1);
          transition: all 0.3s;
          color: white;
          color-scheme: dark;
      }
      input:focus, select:focus, textarea:focus {
          border-color: var(--accent-color);
          box-shadow: 0 0 0 3px rgba(185, 49, 79, 0.1);
          outline: none;
      }

      option {
          background-color: var(--bg-panel);
          color: #e6e6e6;
          padding: 10px;
      }

      /* Botões com efeito Xbox */
      .xbox-button {
          position: relative;
          overflow: hidden;
          transition: all 0.3s;
      }
      .xbox-button::before {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
          transform: translateX(-100%);
          transition: transform 0.6s;
      }
      .xbox-button:hover::before {
          transform: translateX(100%);
      }
      .xbox-button:hover {
          transform: scale(1.02);
          box-shadow: 0 0 20px rgba(185, 49, 79, 0.4);
      }

      /* Scrollbar customizada */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-dark); }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

      /* Sidebar retrátil */
      .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          width: 80px;
          transform: translateX(0);
          transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
          z-index: 50;
      }
      .sidebar.hidden {
          transform: translateX(-100%);
      }
      
      /* Ajustar conteúdo quando sidebar está visível */
      .main-content {
          margin-left: 80px;
          transition: margin-left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }
      .main-content.sidebar-hidden {
          margin-left: 0;
      }

      /* Botão toggle */
      .toggle-sidebar-btn {
          transition: all 0.3s;
      }
      .toggle-sidebar-btn:hover {
          transform: scale(1.1);
          box-shadow: 0 0 15px rgba(185, 49, 79, 0.4);
      }
  </style>
</head>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDsbiLPBOda119Qr6Ji69j8TZLpiFixBWI",
      authDomain: "list-games-9bddd.firebaseapp.com",
      projectId: "list-games-9bddd",
      storageBucket: "list-games-9bddd.firebasestorage.app",
      messagingSenderId: "756898313156",
      appId: "1:756898313156:web:9bc660d0a2f4cd07882a91",
      measurementId: "G-GLM50YVLXP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loading = document.getElementById('loading');
    const appEl = document.getElementById('app');
    const userEmailEl = document.getElementById('user-email');
    const logoutBtn = document.getElementById('logout-btn');

    const groupList = document.getElementById('group-list');
    const groupEmpty = document.getElementById('group-empty');
    const addGroupBtn = document.getElementById('add-group');

    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalSave = document.getElementById('modal-save');
    const modalDelete = document.getElementById('modal-delete');
    const modalCancel = document.getElementById('modal-cancel');
    const modalCancelTop = document.getElementById('modal-cancel-top');

    const nameInput = document.getElementById('f-name');
    const exerciseSelect = document.getElementById('exercise-select');
    const orderInput = document.getElementById('exercise-order');
    const seriesInput = document.getElementById('ex-series');
    const repsInput = document.getElementById('ex-reps');
    const weightInput = document.getElementById('ex-weight');
    const timeInput = document.getElementById('ex-time');
    
    const exerciseListEl = document.getElementById('exercise-list');
    const addExerciseBtn = document.getElementById('add-exercise-btn');

    let uid = null;
    let allGroups = [];
    let allExercises = [];
    let editingId = null;
    let selectedExercises = [];

    // Carregar Exercícios para o Select
    async function loadExercises() {
      if (!uid) return;
      try {
        const snap = await getDocs(collection(db, 'users', uid, 'academia_exercicios'));
        allExercises = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        
        // Ordena exercícios alfabeticamente no select
        allExercises.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
        
        exerciseSelect.innerHTML = '<option value="">Selecione um exercício...</option>';
        allExercises.forEach(ex => {
          const opt = document.createElement('option');
          opt.value = ex.id;
          opt.textContent = ex.name || 'Sem nome';
          exerciseSelect.appendChild(opt);
        });
      } catch(error) {
        console.error("Erro ao carregar exercícios:", error);
      }
    }

    // Renderizar Card do Grupo na Tela Principal
    function renderGroupCard(g) {
      const sortedExercises = (g.exercises || []).sort((a,b) => a.order - b.order);
      
      let exercisesHtml = '';
      if(sortedExercises.length > 0) {
          exercisesHtml = sortedExercises.map(e => `
              <li class="text-sm text-gray-400 border-l-2 border-accent/50 pl-2 mb-1 truncate">
                  <span class="font-bold text-gray-300">${e.order}. ${e.name}</span>
                  <span class="text-xs ml-1 opacity-70">(${e.series || '-'}x${e.reps || '-'})</span>
              </li>
          `).join('');
      } else {
          exercisesHtml = `<li class="text-sm text-gray-600 italic">Sem exercícios</li>`;
      }

      return `
        <div class='task-card rounded-2xl overflow-hidden cursor-pointer p-5 flex flex-col h-full' data-id='${g.id}'>
          <h3 class='text-xl font-bold mb-3 text-white flex items-center gap-2 border-b border-white/10 pb-2'>
            <i data-lucide="folder" class="w-5 h-5 text-accent"></i> ${g.name || 'Grupo Sem Nome'}
          </h3>
          <ul class='flex-1 space-y-1.5'>
            ${exercisesHtml}
          </ul>
        </div>`;
    }

    function renderGroups(list) {
      groupList.innerHTML = '';
      if (!list.length) { 
          groupEmpty.classList.remove('hidden'); 
          return; 
      }
      groupEmpty.classList.add('hidden');
      
      // Ordena grupos alfabeticamente
      list.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
      
      list.forEach(it => groupList.insertAdjacentHTML('beforeend', renderGroupCard(it)));
      
      lucide.createIcons();
      
      groupList.querySelectorAll('[data-id]').forEach(el => {
          el.addEventListener('click', () => openModal(allGroups.find(x => x.id === el.dataset.id)));
      });
    }

    // Renderizar a lista de exercícios DENTRO do modal
    function renderSelectedExercises() {
      exerciseListEl.innerHTML = '';
      if(selectedExercises.length === 0) {
          exerciseListEl.innerHTML = `
            <div class="text-center py-4 text-gray-600 text-sm italic bg-black/20 rounded-xl border border-dashed border-white/10">
                Nenhum exercício adicionado ainda.
            </div>`;
          return;
      }

      selectedExercises.sort((a,b) => a.order - b.order).forEach((e, i) => {
        const item = document.createElement('div');
        item.className = 'bg-black/40 border border-white/5 rounded-xl p-3 flex justify-between items-center gap-3 hover:border-white/10 transition';
        
        let details = [];
        if(e.series) details.push(`${e.series} Séries`);
        if(e.reps) details.push(`${e.reps} Reps`);
        if(e.weight) details.push(`${e.weight}`);
        if(e.time) details.push(`${e.time}`);
        let detailsStr = details.join(' | ');

        item.innerHTML = `
           <div class="flex-1 min-w-0">
               <div class="font-bold text-white text-sm truncate">${e.order}. ${e.name}</div>
               ${detailsStr ? `<div class="text-xs text-accent mt-0.5 font-semibold">${detailsStr}</div>` : ''}
           </div>
           <button type="button" class='text-gray-500 hover:text-red-400 p-2 bg-white/5 hover:bg-red-500/10 rounded-lg transition' data-i='${i}'>
               <i data-lucide="trash-2" class="w-4 h-4"></i>
           </button>
        `;
        exerciseListEl.appendChild(item);
      });
      
      lucide.createIcons();
      
      // Evento de remover
      exerciseListEl.querySelectorAll('button[data-i]').forEach(btn => {
          btn.addEventListener('click', () => {
              selectedExercises.splice(btn.dataset.i, 1);
              renderSelectedExercises();
          });
      });
    }

    // Adicionar Exercício à lista do Grupo (Memória local do Modal)
    addExerciseBtn.addEventListener('click', () => {
      const exId = exerciseSelect.value;
      const order = parseInt(orderInput.value);
      
      if (!exId || isNaN(order)) {
          alert('Por favor, selecione o exercício e informe a ordem numericamente.');
          return;
      }
      
      const ex = allExercises.find(e => e.id === exId);
      
      selectedExercises.push({ 
          id: ex.id, 
          name: ex.name, 
          order: order,
          series: parseInt(seriesInput.value) || null,
          reps: parseInt(repsInput.value) || null,
          weight: weightInput.value.trim() || "",
          time: timeInput.value.trim() || ""
      });
      
      renderSelectedExercises();
      
      // Limpar campos de entrada do exercício
      exerciseSelect.value = '';
      orderInput.value = '';
      seriesInput.value = '';
      repsInput.value = '';
      weightInput.value = '';
      timeInput.value = '';
    });

    // Abrir Modal
    function openModal(data = null) {
      editingId = data ? data.id : null;
      
      modalTitle.innerHTML = editingId 
        ? '<i data-lucide="edit" class="w-5 h-5 text-accent"></i> Editar Grupo' 
        : '<i data-lucide="layers" class="w-5 h-5 text-accent"></i> Novo Grupo';
      
      nameInput.value = data?.name || '';
      selectedExercises = data?.exercises ? JSON.parse(JSON.stringify(data.exercises)) : []; // Deep copy
      
      // Limpar campos de adição
      exerciseSelect.value = '';
      orderInput.value = '';
      seriesInput.value = '';
      repsInput.value = '';
      weightInput.value = '';
      timeInput.value = '';

      renderSelectedExercises();
      
      lucide.createIcons();
      modalDelete.classList.toggle('hidden', !editingId);
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    // Fechar Modal
    const closeModal = () => modal.classList.add('hidden');
    modalCancel.addEventListener('click', closeModal);
    modalCancelTop.addEventListener('click', closeModal);

    // Salvar Grupo no Firebase
    modalSave.addEventListener('click', async () => {
      if (!uid) return;
      
      const groupName = nameInput.value.trim();
      if(!groupName) {
          alert("O nome do grupo é obrigatório!");
          return;
      }

      const payload = {
        name: groupName,
        exercises: selectedExercises
      };

      try {
          const coll = collection(db, 'users', uid, 'academia_grupos');
          if (editingId) {
              await updateDoc(doc(coll, editingId), payload);
          } else {
              await addDoc(coll, payload);
          }
          closeModal();
      } catch (error) {
          console.error("Erro ao salvar grupo:", error);
      }
    });

    // Excluir Grupo
    modalDelete.addEventListener('click', async () => {
      if (!uid || !editingId) return;
      if (!confirm('Deseja realmente excluir este grupo?')) return;
      
      try {
          await deleteDoc(doc(collection(db, 'users', uid, 'academia_grupos'), editingId));
          closeModal();
      } catch (error) {
          console.error("Erro ao deletar grupo:", error);
      }
    });

    // Listener do Firestore para Grupos
    function startListeners() {
      if (!uid) return;
      onSnapshot(query(collection(db, 'users', uid, 'academia_grupos')), snap => {
        const arr = []; 
        snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
        allGroups = arr;
        renderGroups(arr);
      }, (error) => {
          console.error("Erro ao buscar grupos:", error);
      });
    }

    // Auth State
    onAuthStateChanged(auth, async (user) => {
      if (!user) { 
          window.location.href = 'index.html'; 
          return; 
      }
      uid = user.uid;
      userEmailEl.textContent = user.email || user.uid;
      
      await loadExercises(); // Carrega os exercícios disponíveis
      startListeners(); // Escuta as mudanças nos grupos
      
      loading.classList.add('hidden');
      appEl.classList.remove('hidden');
    });

    // Ações de Botões base
    logoutBtn.addEventListener('click', async () => { 
        await signOut(auth); 
        window.location.href = 'index.html'; 
    });
    
    addGroupBtn.addEventListener('click', () => openModal());

  </script>
</body>
</html>
