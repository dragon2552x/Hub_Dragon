<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="referrer" content="no-referrer">
    
    <title>Gerenciador de Animes — My Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        /* Configurações Base */
        :root {
            --accent-color: #B9314F;
            --bg-dark: #0b0b0b;
            --bg-panel: #151515;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #e6e6e6;
            font-family: 'Inter', system-ui, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(185, 49, 79, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(20, 20, 20, 1), transparent 40%);
            min-height: 100vh;
            user-select: none;
        }

        /* Utilitários de Estilo */
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        
        /* Painéis translúcidos */
        .glass-panel {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Cards com efeito Xbox */
        .task-card {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
        }
        .task-card:hover {
            transform: translateY(-4px);
            background: rgba(40, 40, 40, 0.6);
            border-color: rgba(185, 49, 79, 0.3);
            box-shadow: 0 12px 24px -5px rgba(0, 0, 0, 0.6), 0 0 15px rgba(185, 49, 79, 0.1);
        }

        /* Botões com efeito Xbox */
        .xbox-button {
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .xbox-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .xbox-button:hover::before {
            transform: translateX(100%);
        }
        .xbox-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(185, 49, 79, 0.4);
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        /* Sidebar retrátil */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            transform: translateX(0); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 50;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .main-content { margin-left: 80px; transition: margin-left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .main-content.sidebar-hidden { margin-left: 0; }
        .toggle-sidebar-btn { transition: all 0.3s; }
        .toggle-sidebar-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(185, 49, 79, 0.4); }

        /* Animação de Loading */
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

                        <i data-lucide="star" class="w-4 h-4 text-accent"></i> Estrelas
                    </a>
                    <a href="animes_torneio.html" class="w-full text-left px-4 py-3 sm:py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold">
                        <i data-lucide="trophy" class="w-4 h-4 text-accent"></i> Torneio
                    </a>
                    <a href="animes_serie.html" class="w-full text-left px-4 py-3 sm:py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold">

                        <i data-lucide="database" class="w-4 h-4 text-accent"></i> DataBase

<script>
    lucide.createIcons();
    
    // Toggle Sidebar
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    const toggleBtn = document.getElementById('toggle-sidebar');
    
    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
        mainContent.classList.toggle('sidebar-hidden');
    });

    // Dropdown Logic
    window.toggleMoreOptions = (event) => {
        event.stopPropagation();
        document.getElementById('more-options-dropdown').classList.toggle('hidden');
    }

    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('more-options-dropdown');
        const btn = document.getElementById('more-options-btn');
        if (dropdown && !dropdown.contains(e.target) && !btn.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsbiLPBOda119Qr6Ji69j8TZLpiFixBWI",
        authDomain: "list-games-9bddd.firebaseapp.com",
        projectId: "list-games-9bddd",
        storageBucket: "list-games-9bddd.firebasestorage.app",
        messagingSenderId: "756898313156",
        appId: "1:756898313156:web:9bc660d0a2f4cd07882a91",
        measurementId: "G-GLM50YVLXP"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    const userEmailEl = document.getElementById("user-email");
    const statusMsgEl = document.getElementById("status-msg");
    const iconRefresh = document.getElementById("icon-refresh");

    // --- FUNÇÃO AUXILIAR PARA CALCULAR E EXIBIR STATS ---
    function atualizarEstatisticas(listaAnimes) {
        if (!listaAnimes) return;

        const total = listaAnimes.length;
        const completos = listaAnimes.filter(a => a.ESTADO === "Completo" || a.ESTADO === "Assistido").length;
        const vendo = listaAnimes.filter(a => a.ESTADO === "Andamento" || a.ESTADO === "Vendo").length;
        const outros = total - (completos + vendo);

        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-completo").textContent = completos;
        document.getElementById("stat-vendo").textContent = vendo;
        document.getElementById("stat-outros").textContent = outros;

        document.getElementById("stats-container").classList.remove("hidden");
        lucide.createIcons();
    }

    // --- FUNÇÃO PARA CARREGAR DADOS ---
    async function carregarDados(force = false) {
        if (!auth.currentUser) return;
        
        const uid = auth.currentUser.uid;
        const cacheKey = `animes_${uid}`;
        
        // 1. Tentar ler do Cache Local
        if (!force) {
            const cachedData = localStorage.getItem(cacheKey);
            if (cachedData) {
                const animes = JSON.parse(cachedData);
                statusMsgEl.innerHTML = `<span class="text-green-400">✅ ${animes.length} animes carregados do Cache.</span>`;
                atualizarEstatisticas(animes);
                carregarUltimoAnimeAcessado(uid);
                return; 
            }
        }

        // 2. Busca no Firebase se necessário
        try {
            statusMsgEl.textContent = "Baixando dados do servidor...";
            iconRefresh.classList.add("spin");
            
            const animesRef = collection(db, "users", uid, "animes");
            const snapshot = await getDocs(animesRef);
            
            const listaAnimes =[];
            snapshot.forEach(doc => {
                listaAnimes.push(doc.data());
            });

            // 3. Salva no Cache
            localStorage.setItem(cacheKey, JSON.stringify(listaAnimes));
            
            statusMsgEl.innerHTML = `<span class="text-blue-400">🔥 ${listaAnimes.length} animes baixados e salvos!</span>`;
            atualizarEstatisticas(listaAnimes);
            carregarUltimoAnimeAcessado(uid);

        } catch (error) {
            console.error("Erro ao baixar dados:", error);
            statusMsgEl.innerHTML = `<span class="text-red-500">Erro ao baixar dados.</span>`;
        } finally {
            iconRefresh.classList.remove("spin");
        }
    }

    // --- EXPOR FUNÇÃO DE REFRESH PARA O HTML ---
    window.forcarAtualizacao = () => {
        carregarDados(true); 
    };

    function carregarUltimoAnimeAcessado(uid) {
        const cacheKey = `animes_${uid}`;
        const cachedData = localStorage.getItem(cacheKey);

        if (cachedData) {
            const animes = JSON.parse(cachedData);
            
            const listaOrdenada = animes
                .filter(a => a.ultima_atualizacao)
                .sort((a, b) => new Date(b.ultima_atualizacao) - new Date(a.ultima_atualizacao));

            if (listaOrdenada.length > 0) {
                const ultimo = listaOrdenada[0];

                document.getElementById("container-ultimo-anime").classList.remove("hidden");
                document.getElementById("ultimo-nome").textContent = ultimo.NOME || "Sem Nome";
                document.getElementById("ultimo-img").src = ultimo.IMAGEM || "";
                document.getElementById("ultimo-episodios").textContent = `Episódios: ${ultimo.ASSIS || 0}/${ultimo.TOTAIS || 0}`;
                
                const dataObj = new Date(ultimo.ultima_atualizacao);
                const dataFormatada = dataObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
                const horaFormatada = dataObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                document.getElementById("ultimo-data").textContent = `Atualizado em ${dataFormatada} às ${horaFormatada}`;
                
                // Evento de clique com redirecionamento para a lista e busca automática
                document.getElementById("card-ultimo").onclick = () => {
                    window.location.href = `animes_lista.html?search=${encodeURIComponent(ultimo.NOME)}`;
                };

                if (window.lucide) lucide.createIcons();
            }
        }
    }

    // --- FUNÇÃO SAIR (MY HUB) ---
    window.sairParaHub = () => {
        if (auth.currentUser) {
            localStorage.removeItem(`animes_${auth.currentUser.uid}`);
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        } else {
            window.location.href = 'index.html';
        }
    };

    // --- AUTH STATE ---
    onAuthStateChanged(auth, user => {
        if (user) {
            userEmailEl.textContent = user.email || user.uid;
            carregarDados(false);
        } else {
            window.location.href = "index.html";
        }
    });
</script>

</body>
