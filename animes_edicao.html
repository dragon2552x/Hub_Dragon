<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="referrer" content="no-referrer">
    
    <title>Edição de Animes — My Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root { --accent-color: #B9314F; --bg-dark: #0b0b0b; }
        
        body {
            background-color: var(--bg-dark); color: #e6e6e6; font-family: 'Inter', system-ui, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(185, 49, 79, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(20, 20, 20, 1), transparent 40%);
            min-height: 100vh;
        }

        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        
        .glass-panel { background: rgba(21, 21, 21, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .task-card {
            background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }

        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 80px; transform: translateX(0); transition: transform 0.3s; z-index: 50; }
        .sidebar.hidden { transform: translateX(-100%); }
        .main-content { margin-left: 80px; transition: margin-left 0.3s; }
        .main-content.sidebar-hidden { margin-left: 0; }

        /* Pill Buttons */
        .filter-btn {
            background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a3a3a3; padding: 10px 22px; border-radius: 9999px; font-size: 14px; font-weight: 700;
            white-space: nowrap; transition: all 0.3s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); text-decoration: none; display: inline-block;
        }
        .filter-btn:hover { background: rgba(50, 50, 50, 0.8); color: white; transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.1); }
        .filter-btn.active {
            background: var(--accent-color); color: white; border-color: rgba(185, 49, 79, 0.6);
            box-shadow: 0 0 20px rgba(185, 49, 79, 0.5), inset 0 0 10px rgba(0,0,0,0.2); transform: scale(1.05);
        }

        /* Animações do Pop-up (Toast) */
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOutUp {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
        .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .toast-exit { animation: fadeOutUp 0.3s ease-in forwards; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <aside id="sidebar" class="sidebar flex flex-col w-20 bg-[#121212] border-r border-white/10 items-center py-6 flex-shrink-0 glass-panel">
        <div class="text-accent mb-8"><i data-lucide="sparkle" class="w-10 h-10"></i></div>
        <nav class="flex flex-col gap-3 md:gap-6 items-center flex-1">
            <a href="home.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Início"><i data-lucide="home" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="games_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Games"><i data-lucide="gamepad-2" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="animes_manager.html" class="text-accent p-1.5 md:p-2 bg-white/5 rounded-xl" title="Animes"><i data-lucide="tv" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="cards.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Cards"><i data-lucide="layers" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="hqs_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="HQs"><i data-lucide="book-open-text" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="manga_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Mangás"><i data-lucide="notebook-text" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="manhwa_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Manhwas"><i data-lucide="smartphone" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="academia_exercicios.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Academia"><i data-lucide="dumbbell" class="w-5 h-5 md:w-7 md:h-7"></i></a>
            <a href="to_do.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="To Do"><i data-lucide="check-square" class="w-5 h-5 md:w-7 md:h-7"></i></a>
        </nav>
        <button id="logout-btn" class="mt-auto text-red-500 hover:text-red-400 p-1.5 md:p-2 hover:bg-red-500/10 rounded-xl transition" title="Sair"><i data-lucide="log-out" class="w-5 h-5 md:w-7 md:h-7"></i></button>
    </aside>

    <main id="main-content" class="main-content flex-1 flex flex-col overflow-hidden relative">
        <header class="flex justify-between items-center p-6 md:px-8 bg-transparent z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button id="toggle-sidebar" class="p-2 bg-white/5 hover:bg-white/10 rounded-xl text-gray-400 hover:text-accent transition"><i data-lucide="menu" class="w-5 h-5"></i></button>
                <h2 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3"><i data-lucide="tv" class="text-accent"></i> My Animes</h2>
            </div>
            <div class="hidden sm:block text-sm text-gray-400 bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                Usuário: <span id="user-email" class="text-accent font-mono font-bold">...</span>
            </div>
        </header>

        <div id="app" class="flex-1 overflow-y-auto p-6 md:px-8 pb-28">
            <div class="max-w-5xl mx-auto space-y-6">

                <div class="task-card p-6 rounded-2xl flex flex-col gap-6">
                    <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4 border-b border-white/5 pb-6">
                        <div class="flex gap-4">
                            <div class="w-20">
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Nº</label>
                                <input id="edit_n" disabled class="w-full px-3 py-2.5 bg-black/50 text-gray-500 border border-white/5 rounded-xl text-center font-mono outline-none">
                            </div>
                            <div class="w-20">
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Serial</label>
                                <input id="edit_serie" disabled class="w-full px-3 py-2.5 bg-black/50 text-gray-500 border border-white/5 rounded-xl text-center font-mono outline-none">
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 md:gap-3">
                            <button class="flex-1 sm:flex-none bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/20 px-4 py-2.5 rounded-xl font-bold transition-all text-sm flex justify-center items-center gap-2" onclick="excluirAnime()">
                                <i data-lucide="trash-2" class="w-4 h-4"></i> Excluir
                            </button>
                            <button class="flex-1 sm:flex-none bg-white/5 hover:bg-white/10 border border-white/10 text-white px-4 py-2.5 rounded-xl font-bold transition-all text-sm flex justify-center items-center gap-2" onclick="limparEdicao()">
                                <i data-lucide="eraser" class="w-4 h-4"></i> Limpar
                            </button>
                            <button class="flex-1 sm:flex-none bg-blue-500/10 hover:bg-blue-500/20 border border-blue-500/20 text-blue-400 px-4 py-2.5 rounded-xl font-bold transition-all text-sm flex justify-center items-center gap-2" onclick="buscarAnime()">
                                <i data-lucide="search" class="w-4 h-4"></i> Pesquisar
                            </button>
                            <button class="w-full sm:w-auto bg-accent text-white hover:bg-[#992743] hover:scale-105 border border-accent/50 px-6 py-2.5 rounded-xl font-bold transition-all text-sm shadow-lg shadow-accent/20 flex justify-center items-center gap-2" onclick="confirmarEdicao()">
                                <i data-lucide="save" class="w-4 h-4"></i> Salvar Edição
                            </button>
                        </div>
                    </div>

                    <div class="relative">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Nome (Selecione ou busque para editar)</label>
                        <div class="relative flex items-center">
                            <input id="edit_nome" type="text" placeholder="Digite ou selecione..." autocomplete="off" class="w-full px-4 py-3 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent focus:ring-1 focus:ring-accent outline-none pr-10 transition-all font-semibold text-lg">
                            <span id="edit_nome_arrow" class="absolute right-3 text-gray-400 cursor-pointer select-none hover:text-white p-1 bg-white/5 rounded-lg"><i data-lucide="chevron-down" class="w-5 h-5"></i></span>
                        </div>
                        <div id="edit_nome_dropdown" class="absolute z-50 bg-[#151515] border border-white/10 w-full rounded-xl mt-2 max-h-48 overflow-y-auto hidden shadow-2xl custom-scrollbar"></div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Estilo</label>
                            <select id="edit_estilo" onchange="atualizarGrupoNotas()" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none appearance-none">
                                <option value="" disabled selected class="bg-[#151515]"></option>
                                <option class="bg-[#151515]">Anime</option>
                                <option class="bg-[#151515]">Anime Inf.</option>
                                <option class="bg-[#151515]">Filme</option>
                                <option class="bg-[#151515]">Especial</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Estado</label>
                            <select id="edit_estado" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none appearance-none">
                                <option value="" disabled selected class="bg-[#151515]"></option>
                                <option class="bg-[#151515]">Completo</option>
                                <option class="bg-[#151515]">Andamento</option>
                                <option class="bg-[#151515]">Incompleto</option>
                                <option class="bg-[#151515]">Assistido</option>
                                <option class="bg-[#151515]">Desistência</option>
                                <option class="bg-[#151515]">N. Começado</option>
                                <option class="bg-[#151515]">N. Assistido</option>
                                <option class="bg-[#151515]">N. Lançado</option>
                                <option class="bg-[#151515]">N. Sei</option>
                            </select>
                        </div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Temporada</label>
                            <select id="edit_temp" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none appearance-none">
                                <option value="" disabled selected class="bg-[#151515]"></option>
                                <option class="bg-[#151515]">Inverno (1)</option>
                                <option class="bg-[#151515]">Primavera (4)</option>
                                <option class="bg-[#151515]">Verão (7)</option>
                                <option class="bg-[#151515]">Outono (10)</option>
                                <option class="bg-[#151515]">Outro</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Eps. Assis.</label>
                            <input id="edit_eps_ass" type="number" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Eps. Totais</label>
                            <input id="edit_eps_tot" type="number" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Ano</label>
                            <input id="edit_ano" type="number" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6 border-t border-white/5">
                        
                        <div class="md:col-start-3 flex flex-col items-center">
                            <div class="w-full mb-4">
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Link da Imagem</label>
                                <input id="edit_img" type="text" oninput="previewEditImage()" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none">
                            </div>
                            <div class="w-full aspect-[2/3] max-w-[200px] md:max-w-none bg-black/50 border border-white/10 rounded-2xl relative overflow-hidden flex flex-col items-center justify-center shrink-0 shadow-lg mx-auto">
                                <img id="edit_img_preview" src="" class="w-full h-full object-cover hidden transition-transform duration-500 hover:scale-105" alt="Capa">
                                <div id="edit_img_text_span" class="text-gray-500 text-xs font-bold text-center flex flex-col items-center gap-2">
                                    <i data-lucide="image" class="w-8 h-8 opacity-50"></i><span>Prévia da Imagem</span>
                                </div>
                            </div>
                        </div>

                        <div class="md:col-span-2 md:col-start-1 md:row-start-1 space-y-6">
                            
                            <details id="musicas_group" class="bg-black/30 p-5 shadow-xl rounded-2xl border border-white/5 group">
                                <summary class="cursor-pointer text-accent font-bold flex items-center gap-2 outline-none">
                                    <i data-lucide="music" class="w-4 h-4"></i> 
                                    Músicas (<span id="musicas_count">0</span>)
                                </summary>
                                <div class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">
                                    <select id="edit_tipo_musica" class="bg-black/40 border border-white/10 text-white rounded-xl px-4 py-2.5 outline-none focus:border-accent appearance-none">
                                        <option value="OP" class="bg-[#151515]">Opening</option>
                                        <option value="ED" class="bg-[#151515]">Ending</option>
                                        <option value="OST" class="bg-[#151515]">Trilha Sonora</option>
                                    </select>
                                    <input id="edit_musica_texto" type="text" placeholder="Nome / URL" class="bg-black/40 border border-white/10 text-white rounded-xl px-4 py-2.5 outline-none focus:border-accent sm:col-span-2">
                                    <button type="button" onclick="adicionarMusica()" class="bg-accent text-white px-4 py-2.5 rounded-xl font-bold sm:col-span-3 hover:bg-[#992743] transition-colors flex items-center justify-center gap-2 shadow-lg"><i data-lucide="plus" class="w-4 h-4"></i> Adicionar Música</button>
                                </div>
                                <ul id="lista_musicas" class="mt-4 space-y-2 max-h-44 overflow-y-auto custom-scrollbar text-sm text-gray-300 pr-2"></ul>
                            </details>

                            <details id="notas_group" class="bg-black/30 p-5 shadow-xl rounded-2xl border border-white/5 group" open>
                                <summary class="cursor-pointer text-accent font-bold flex items-center gap-2 outline-none">
                                    <i data-lucide="star" class="w-4 h-4"></i> 
                                    Notas Específicas <span id="notas_estilo_label" class="text-gray-400 font-normal ml-2 text-xs"></span>
                                </summary>
                                <div id="notas_content" class="mt-4 p-4 bg-black/40 border border-white/10 rounded-xl min-h-[140px] text-gray-300 text-sm flex items-center justify-center">
                                    Escolha um Estilo no topo para mostrar os campos adequados.
                                </div>
                            </details>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 pt-6 border-t border-white/5">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Nota MAL</label>
                            <input id="edit_nota_mal" type="number" step="0.01" min="0" max="10" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none text-center font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wide mb-1.5">Stars</label>
                            <select id="edit_stars" class="w-full px-4 py-2.5 bg-black/40 text-white border border-white/10 rounded-xl focus:border-accent outline-none appearance-none text-center font-bold">
                                <option value="" class="bg-[#151515]">-</option>
                                <option value="✶" class="bg-[#151515]">🥇 R1</option><option value="✶ ✶" class="bg-[#151515]">🥈 R2</option><option value="✶ ✶ ✶" class="bg-[#151515]">🥉 R3</option>
                                <option value="5" class="bg-[#151515]">5 ⭐</option><option value="4" class="bg-[#151515]">4 ⭐</option><option value="3" class="bg-[#151515]">3 ⭐</option><option value="2" class="bg-[#151515]">2 ⭐</option><option value="1" class="bg-[#151515]">1 ⭐</option><option value="0" class="bg-[#151515]">0 ⭐</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-accent uppercase tracking-wide mb-1.5 text-center">Nota Final</label>
                            <input id="edit_nota_final" type="text" disabled class="w-full px-4 py-2.5 bg-black/50 border border-accent/50 text-accent font-bold text-lg rounded-xl text-center shadow-[0_0_15px_rgba(185,49,79,0.2)]">
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-[#0b0b0b]/80 backdrop-blur-xl border-t border-white/5 p-4 flex justify-center gap-2 sm:gap-4 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
            <a href="animes_manager.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">Início</span></a>
            <a href="animes_cadastro.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="file-edit" class="w-4 h-4"></i> <span class="hidden sm:inline">Cadastro</span></a>
            <a href="animes_edicao.html" class="bg-accent text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-accent/20"><i data-lucide="pencil-ruler" class="w-4 h-4"></i> <span class="hidden sm:inline">Edição</span></a>
            <a href="animes_lista.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="list" class="w-4 h-4"></i> <span class="hidden sm:inline">Lista</span></a>
            
            <div class="relative flex">
                <button id="more-options-btn" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2" onclick="toggleMoreOptions(event)">
                    <i data-lucide="more-horizontal" class="w-4 h-4"></i> <span class="hidden sm:inline">Mais</span>
                </button>
                <div id="more-options-dropdown" class="absolute bottom-full mb-3 right-0 w-48 glass-panel border border-white/10 rounded-2xl shadow-2xl p-2 hidden z-50 flex-col gap-1">
                    <a href="animes_classificacoes.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="bar-chart-2" class="w-4 h-4 text-accent"></i> Classificação</a>
                    <a href="animes_estrelas.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="star" class="w-4 h-4 text-accent"></i> Estrelas</a>
                    <a href="animes_torneio.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="trophy" class="w-4 h-4 text-accent"></i> Torneio</a>
                    <a href="animes_serie.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="layers" class="w-4 h-4 text-accent"></i> Série</a>
                    <a href="animes_database.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="database" class="w-4 h-4 text-accent"></i> DataBase</a>
                </div>
            </div>
        </div>
    </main>

<script>
    lucide.createIcons();
    
    // Toggle Sidebar
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
        mainContent.classList.toggle('sidebar-hidden');
    });

    // More Options Bottom Nav
    window.toggleMoreOptions = (event) => {
        event.stopPropagation();
        document.getElementById('more-options-dropdown').classList.toggle('hidden');
    }

    async function loadAnimeNamesForEdit() {
        try {
            const user = auth.currentUser;
            if (!user) return;
            const cacheKey = `animes_${user.uid}`;
            const cachedData = localStorage.getItem(cacheKey);
            
            window.editAnimeNamesCache = [];

            if (cachedData) {
                JSON.parse(cachedData).forEach(anime => {
                    if (anime && anime.NOME) window.editAnimeNamesCache.push(anime.NOME);
                });
            } else {
                const snapshot = await getDocs(collection(db, "users", user.uid, "animes"));
                snapshot.forEach(d => {
                    if (d.data() && d.data().NOME) window.editAnimeNamesCache.push(d.data().NOME);
                });
                const listaParaCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                localStorage.setItem(cacheKey, JSON.stringify(listaParaCache));
            }

            window.editAnimeNamesCache.sort((a, b) => a.localeCompare(b));
            if (typeof setupEditNomeAutoComplete === "function") setupEditNomeAutoComplete();

        } catch (err) {
            console.error("Erro ao carregar nomes para edição:", err);
        }
    }

    function setupEditNomeAutoComplete() {
        const input = document.getElementById("edit_nome");
        const dropdown = document.getElementById("edit_nome_dropdown");
        const arrow = document.getElementById("edit_nome_arrow");

        if (!input || !dropdown || !arrow) return;

        function updateDropdown(filter = "") {
            dropdown.innerHTML = "";
            const results = (window.editAnimeNamesCache || []).filter(nome =>
                nome.toLowerCase().includes(String(filter).toLowerCase())
            );

            if (!results.length) {
                dropdown.classList.add("hidden");
                return;
            }

            for (const nome of results) {
                const option = document.createElement("div");
                option.className = "px-4 py-3 hover:bg-white/10 cursor-pointer text-sm text-gray-200 border-b border-white/5 last:border-0 transition-colors";
                option.textContent = nome;
                option.onclick = () => {
                    input.value = nome;
                    dropdown.classList.add("hidden");
                };
                dropdown.appendChild(option);
            }
            dropdown.classList.remove("hidden");
        }

        input.oninput = () => updateDropdown(input.value);
        input.onfocus = () => { if (input.value.trim()) updateDropdown(input.value); };
        
        arrow.onclick = (e) => {
            e.stopPropagation();
            if (dropdown.classList.contains("hidden")) {
                updateDropdown("");
                input.focus();
            } else {
                dropdown.classList.add("hidden");
            }
        };

        document.onclick = (e) => {
            if (input.contains(e.target) || dropdown.contains(e.target) || arrow.contains(e.target)) return;
            dropdown.classList.add("hidden");
        };
    }

    function gerarFaixasNota() {
        let faixas = `<option value="1" class="bg-[#151515]">1</option><option value="2-3" class="bg-[#151515]">2-3</option><option value="4-6" class="bg-[#151515]">4-6</option><option value="7-9" class="bg-[#151515]">7-9</option>`;
        for (let i = 10; i <= 50; i += 3) faixas += `<option value="${i}-${i+2}" class="bg-[#151515]">${i}-${i+2}</option>`;
        faixas += `<option value="Final" class="bg-[#151515]">Final</option>`; 
        return faixas;
    }
    
    function faixaParaIndice(faixa) { 
        if (faixa === "2-3") return 0;
        const [ini] = faixa.split("-").map(n => parseInt(n)); 
        return 1 + Math.floor((ini - 4) / 3); 
    }

    window.addNotaAnime = () => {
        const faixa = document.getElementById("nota_faixa").value; 
        const valor = document.getElementById("nota_valor").value;
        if (!faixa || valor === "") { showToast("Informe a nota!", "warning"); return; }
        
        if (faixa === "1") { if(window._notasAnime.ep1) { showToast("Já existe!", "warning"); return;} window._notasAnime.ep1 = valor; }
        else if (faixa === "Final") { if(window._notasAnime.epf) { showToast("Já existe!", "warning"); return;} window._notasAnime.epf = valor; }
        else { const pos = faixaParaIndice(faixa); if(window._notasAnime.eps[pos]) { showToast("Já existe!", "warning"); return;} window._notasAnime.eps[pos] = valor; }
        window.atualizarVisualizacaoNotasAnime();
    };

    window.editNotaAnime = () => {
        const f = document.getElementById("nota_faixa").value; 
        const v = document.getElementById("nota_valor").value;
        if (!f || v === "") return;
        if (f === "1") window._notasAnime.ep1 = v; 
        else if (f === "Final") window._notasAnime.epf = v; 
        else window._notasAnime.eps[faixaParaIndice(f)] = v;
        window.atualizarVisualizacaoNotasAnime();
    };

    window.deleteNotaAnime = () => {
        const f = document.getElementById("nota_faixa").value; if (!f) return;
        if (f === "1") window._notasAnime.ep1 = ""; 
        else if (f === "Final") window._notasAnime.epf = ""; 
        else window._notasAnime.eps[faixaParaIndice(f)] = "";
        window.atualizarVisualizacaoNotasAnime();
    };

    window.atualizarVisualizacaoNotasAnime = () => {
        const box = document.getElementById("anime_notas_visualizacao"); if (!box) return;
        const { ep1, eps, epf } = window._notasAnime; 
        let html = `<div class="flex gap-3 items-center whitespace-nowrap">`;
        
        if (ep1) html += `<div class="px-3 py-1.5 bg-black/40 rounded-xl border border-white/10 shadow-sm flex items-center gap-2"><span class="text-accent font-bold">1:</span><span class="text-white">${ep1}</span></div>`;
        
        for (let i = 0; i < eps.length; i++) {
            if (!eps[i]) continue;
            let ini = i === 0 ? 2 : 4 + (i-1)*3; let fim = ini + 2;
            html += `<div class="px-3 py-1.5 bg-black/40 rounded-xl border border-white/10 shadow-sm flex items-center gap-2"><span class="text-accent font-bold">${ini}-${fim}:</span><span class="text-white">${eps[i]}</span></div>`;
        }
        
        if (epf) html += `<div class="px-3 py-1.5 bg-black/40 rounded-xl border border-white/10 shadow-sm flex items-center gap-2"><span class="text-accent font-bold">Final:</span><span class="text-white">${epf}</span></div>`;
        
        html += `</div>`; 
        box.innerHTML = html;
    };

    function calcularNotaFinalOP() {
        const semOp = document.getElementById("sem_op_nota").value;
        const opFinal = document.getElementById("op_final");
        if (semOp !== "") { opFinal.value = semOp; return; }
        let soma = 0, grupos = 0;
        for (let i=1; i<=3; i++) {
            let m = parseFloat(document.getElementById(`op_musica_${i}`).value);
            let a = parseFloat(document.getElementById(`op_anim_${i}`).value);
            if (!isNaN(m) && !isNaN(a)) { soma += (m+a); grupos++; }
        }
        opFinal.value = grupos === 0 ? "" : (soma/grupos).toFixed(2);
    }

    function instalarEventosOP() {
        ["op_musica_1","op_musica_2","op_musica_3","op_anim_1","op_anim_2","op_anim_3","sem_op_nota"].forEach(id => { 
            const el = document.getElementById(id); 
            if (el) el.addEventListener("input", calcularNotaFinalOP); 
        }); 
    }

    function renderListaMusicas() {

            li.className = "flex justify-between items-center p-2 rounded-xl hover:bg-white/5 transition-colors border border-transparent hover:border-white/10";

        const sel = document.getElementById('ai_arco_select'); 
        const lst = document.getElementById('ai_arco_lista');
        if(!sel||!lst) return;
        
        sel.innerHTML = '<option value="" class="bg-[#151515]">-- Novo Arco --</option>';
        Object.keys(window._arcosAnime).forEach(n => sel.innerHTML += `<option value="${n}" class="bg-[#151515]">${n}</option>`);
        sel.onchange = () => { const a = window._arcosAnime[sel.value]; document.getElementById('ai_nota_i').value = a?a.i:''; document.getElementById('ai_nota_m').value = a?a.m:''; document.getElementById('ai_nota_f').value = a?a.f:''; };
        
        lst.innerHTML = '';
        if(Object.keys(window._arcosAnime).length===0) { lst.innerHTML = '<span class="text-gray-500">Nenhum arco cadastrado.</span>'; return; }
        
        Object.entries(window._arcosAnime).forEach(([n, a]) => {
            const v =[a.i, a.m, a.f].filter(x=>x>0); 
            const md = v.length>0 ? (v.reduce((s,c)=>s+c,0)/v.length).toFixed(2) : 'N/A';
            const item = document.createElement('div'); 
            item.className = 'py-2 px-3 border-b border-white/5 last:border-b-0 cursor-pointer hover:bg-white/5 rounded-xl transition-colors text-gray-300 flex items-center gap-2';
            item.innerHTML = `<i data-lucide="play" class="w-3 h-3 text-green-400"></i> ${n} (I:${a.i}, M:${a.m}, F:${a.f} | Média: ${md})`;
            item.onclick = () => { sel.value = n; sel.dispatchEvent(new Event('change')); }; 
            lst.appendChild(item);
        });
        lucide.createIcons();
    };

    window.aiAdicionarArco = () => {
        const s = document.getElementById('ai_arco_select'); 
        const i = parseFloat(document.getElementById('ai_nota_i').value); 
        const m = parseFloat(document.getElementById('ai_nota_m').value); 
        const f = parseFloat(document.getElementById('ai_nota_f').value);
        
        if ([i,m,f].filter(n => !isNaN(n)&&n>=0).length === 0) return;
        
        let n = s.value; 
        if(!n) { 
            let mx=0; 
            Object.keys(window._arcosAnime).forEach(k=>{const mt=k.match(/Arco (\d+)/); if(mt) mx=Math.max(mx,parseInt(mt[1]));}); 
            n=`Arco ${mx+1}`; 
        }
        window._arcosAnime[n] = { i: isNaN(i)?0:i, m: isNaN(m)?0:m, f: isNaN(f)?0:f }; 
        window.renderizarListaArcos(); 
        s.value = n; 
        s.dispatchEvent(new Event('change'));
    };

    window.aiExcluirArco = () => { 
        const s = document.getElementById('ai_arco_select'); 
        if(!s.value) return; 
        if(confirm("Excluir este arco?")) { 
            delete window._arcosAnime[s.value]; 
            window.renderizarListaArcos(); 
            s.value=""; 
            s.dispatchEvent(new Event('change')); 
        }
    };

    window.renderizarListaOpenings = () => {
        const sel = document.getElementById('ai_op_select'); 
        const lst = document.getElementById('ai_op_lista');
        if(!sel||!lst) return;
        
        sel.innerHTML = '<option value="" class="bg-[#151515]">-- Nova Opening --</option>';
        Object.keys(window._openingsAnime).forEach(n => sel.innerHTML += `<option value="${n}" class="bg-[#151515]">${n}</option>`);
        sel.onchange = () => { const a = window._openingsAnime[sel.value]; document.getElementById('ai_op_musica').value = a?a.musica:''; document.getElementById('ai_op_animacao').value = a?a.animacao:''; };
        
        lst.innerHTML = '';
        if(Object.keys(window._openingsAnime).length===0) { lst.innerHTML = '<span class="text-gray-500">Nenhuma Opening cadastrada.</span>'; return; }
        
        Object.entries(window._openingsAnime).forEach(([n, a]) => {
            const v = [a.musica, a.animacao].filter(x=>x>0); 
            const t = v.reduce((s,c)=>s+c,0).toFixed(2);
            const item = document.createElement('div'); 
            item.className = 'py-2 px-3 border-b border-white/5 last:border-b-0 cursor-pointer hover:bg-white/5 rounded-xl transition-colors text-gray-300 flex items-center gap-2';
            item.innerHTML = `<i data-lucide="music" class="w-3 h-3 text-accent"></i> ${n} (Mús:${a.musica}, Anim:${a.animacao} | Total: ${t})`;
            item.onclick = () => { sel.value = n; sel.dispatchEvent(new Event('change')); }; 
            lst.appendChild(item);
        });
        lucide.createIcons();
    };

    window.aiAdicionarOpening = () => {
        const s = document.getElementById('ai_op_select'); 
        const m = parseInt(document.getElementById('ai_op_musica').value); 
        const a = parseInt(document.getElementById('ai_op_animacao').value);
        if((isNaN(m)||m<0||m>5) && (isNaN(a)||a<0||a>5)) return;
        
        let n = s.value; 
        if(!n) { 
            let mx=0; 
            Object.keys(window._openingsAnime).forEach(k=>{const mt=k.match(/Op\. (\d+)/); if(mt) mx=Math.max(mx,parseInt(mt[1]));}); 
            n=`Op. ${mx+1}`; 
        }
        window._openingsAnime[n] = { musica: isNaN(m)?0:m, animacao: isNaN(a)?0:a }; 
        window.renderizarListaOpenings(); 
        s.value = n; 
        s.dispatchEvent(new Event('change'));
    };

    window.aiExcluirOpening = () => { 
        const s = document.getElementById('ai_op_select'); 
        if(!s.value) return; 
        if(confirm("Excluir esta Opening?")) { 
            delete window._openingsAnime[s.value]; 
            window.renderizarListaOpenings(); 
            s.value=""; 
            s.dispatchEvent(new Event('change')); 
        }
    };

    window.limparEdicao = () => {
        ["edit_nome","edit_n","edit_serie","edit_estado","edit_estilo","edit_temp","edit_ano","edit_eps_ass","edit_eps_tot","edit_img","edit_stars","edit_nota_mal","edit_nota_final"].forEach(id => { const el = document.getElementById(id); if(el) el.value = ""; });
        window._arcosAnime = {}; window._openingsAnime = {}; window._notasAnime = { ep1: "", eps: [], epf: "" }; musicasEditando =[];
        
        const dd = document.getElementById("edit_nome_dropdown"); if(dd) dd.classList.add("hidden");
        const imgPrev = document.getElementById("edit_img_preview"); const imgText = document.getElementById("edit_img_text_span");
        if(imgPrev && imgText){ imgPrev.src = ""; imgPrev.classList.add("hidden"); imgText.classList.remove("hidden"); }
        
        document.getElementById("lista_musicas").innerHTML=""; 
        document.getElementById("musicas_count").textContent="0";
        
        const content = document.getElementById("notas_content"); 
        if(content) content.innerHTML=`<div class="mt-4 p-4 bg-black/40 border border-white/10 rounded-xl min-h-[140px] text-gray-300 text-sm flex items-center justify-center">Escolha um Estilo no topo para mostrar os campos adequados.</div>`;
        const l = document.getElementById("notas_estilo_label"); if(l) l.textContent="";
    };

    window.buscarAnime = async () => {
        const nb = document.getElementById("edit_nome").value.trim(); 
        if(!nb) { showToast("Digite o nome para pesquisar!", "warning"); return; }
        
        const u = auth.currentUser; 
        const ck = `animes_${u.uid}`; 
        const cd = localStorage.getItem(ck); 
        let d = null;
        
        if(cd) { d = JSON.parse(cd).find(a => a.NOME.toLowerCase() === nb.toLowerCase()); }
        if(!d) { 
            const ref = doc(db, "users", u.uid, "animes", nb); 
            const snap = await getDoc(ref); 
            if(!snap.exists()) { showToast("Anime não encontrado!", "warning"); return; } 
            d = snap.data(); 
        }
        
        window.limparEdicao();
        
        ["edit_nome","edit_n","edit_serie","edit_estado","edit_estilo","edit_temp","edit_ano","edit_eps_ass","edit_eps_tot","edit_img","edit_stars","edit_nota_mal"].forEach(k => {
            const map = {edit_n:"Num", edit_serie:"SERIE", edit_estado:"ESTADO", edit_estilo:"ESTILO", edit_temp:"TEMPORADA", edit_ano:"ANO", edit_eps_ass:"ASSIS", edit_eps_tot:"TOTAIS", edit_img:"IMAGEM", edit_stars:"STARS", edit_nota_mal:"N_MAL", edit_nome:"NOME"};
            if(document.getElementById(k)) document.getElementById(k).value = d[map[k]] ?? "";
        });
        
        document.getElementById("edit_nota_final").value = d.NOTA_F ? d.NOTA_F.toFixed(2) : ""; 
        window.previewEditImage();
        
        musicasEditando =[];
        if(d.M_Opening) d.M_Opening.split(",").filter(x=>x.trim()).forEach(m=>musicasEditando.push({tipo:"OP",nome:m}));
        if(d.M_End) d.M_End.split(",").filter(x=>x.trim()).forEach(m=>musicasEditando.push({tipo:"ED",nome:m}));
        if(d.M_Trilha) d.M_Trilha.split(",").filter(x=>x.trim()).forEach(m=>musicasEditando.push({tipo:"OST",nome:m}));
        
        document.getElementById("musicas_count").textContent = musicasEditando.length; 
        renderListaMusicas();
        
        window.atualizarGrupoNotas();
        
        if(d.ESTILO==="Filme") { if(document.getElementById("edit_nota_filme")) document.getElementById("edit_nota_filme").value = d["N. FILME ESP."] ?? ""; }
        if(d.ESTILO==="Especial") { if(document.getElementById("edit_nota_especial")) document.getElementById("edit_nota_especial").value = d["N. FILME ESP."] ?? ""; }
        if(d.ESTILO==="Anime") {
            window._notasAnime = { ep1: d.N_Ep_1??"", eps: d.N_Eps?d.N_Eps.split(",").map(x=>x.trim()).filter(x=>x!==""):[], epf: d.N_Ep_F??"" };
            window.atualizarVisualizacaoNotasAnime();
            if(d.OPENING) { 
                const p = d.OPENING.split(",").filter(x=>x.trim());
                ["op_musica_1","op_anim_1","op_musica_2","op_anim_2","op_musica_3","op_anim_3"].forEach((id,i) => { 
                    if(document.getElementById(id)) document.getElementById(id).value = p[i]??""; 
                }); 
            }
            if(document.getElementById("op_final")) document.getElementById("op_final").value = d.OP??"";
            if(document.getElementById("sem_op_nota")) document.getElementById("sem_op_nota").value = d["Sem OP."]??"";
        }
        if(d.ESTILO==="Anime Inf.") {
            try{ window._arcosAnime = JSON.parse(d["N. A+ e INFT."]||"{}"); }catch(e){ window._arcosAnime={}; }
            try{ window._openingsAnime = JSON.parse(d["OPENINGS_INFT"]||"{}"); }catch(e){ window._openingsAnime={}; }
            window.renderizarListaArcos(); window.renderizarListaOpenings();
        }
    };

    window.excluirAnime = async () => {
        const n = document.getElementById("edit_nome").value.trim(); if(!n) return;
        if(!confirm(`Excluir "${n}" permanentemente?`)) return;
        try {
            const u = auth.currentUser; const ck = `animes_${u.uid}`;
            await deleteDoc(doc(db, "users", u.uid, "animes", n));
            const cd = localStorage.getItem(ck);
            if(cd) localStorage.setItem(ck, JSON.stringify(JSON.parse(cd).filter(a => a.NOME !== n)));
            showToast("Excluído com sucesso!", "success"); 
            window.limparEdicao(); 
            loadAnimeNamesForEdit();
        } catch(e) { showToast("Erro ao excluir.", "error"); }
    };

    window.confirmarEdicao = async () => {
        const n = document.getElementById("edit_nome").value.trim(); 
        const num = document.getElementById("edit_n").value;
        if(!n || !num) { showToast("Selecione e pesquise um anime antes de salvar!", "warning"); return; }
        
        let mop="", med="", mtr="";
        musicasEditando.forEach(m => { 
            if(m.tipo==="OP") mop+=m.nome+","; 
            else if(m.tipo==="ED") med+=m.nome+","; 
            else mtr+=m.nome+","; 
        });
        mop=mop.replace(/,$/,""); med=med.replace(/,$/,""); mtr=mtr.replace(/,$/,"");
        
        const est = document.getElementById("edit_estilo").value;
        let pNotas = {}, dn = { TOTAIS: document.getElementById("edit_eps_tot").value, notasAnime:null, notasOpening:null, notaFilme:null, notaEspecial:null, notaInf:null };
        
        if(est==="Anime") {
            const m1=document.getElementById("op_musica_1").value, a1=document.getElementById("op_anim_1").value, m2=document.getElementById("op_musica_2").value, a2=document.getElementById("op_anim_2").value, m3=document.getElementById("op_musica_3").value, a3=document.getElementById("op_anim_3").value, sop=document.getElementById("sem_op_nota").value;
            dn.notasAnime = window._notasAnime; dn.notasOpening = {m1,a1,m2,a2,m3,a3,SEM_OP:sop};
            pNotas = { N_Ep_1: window._notasAnime.ep1, N_Ep_F: window._notasAnime.epf, N_Eps: window._notasAnime.eps.join(","), OPENING: [m1,a1,m2,a2,m3,a3].join(","), OP: document.getElementById("op_final").value, "Sem OP.": sop };
        } else if(est==="Filme" || est==="Especial") {
            const val = document.getElementById(est==="Filme"?"edit_nota_filme":"edit_nota_especial").value;
            if(est==="Filme") dn.notaFilme = val; else dn.notaEspecial = val; 
            pNotas = { "N. FILME ESP.": val };
        } else if(est==="Anime Inf.") {
            let sMa=0, ca=0; 
            Object.values(window._arcosAnime).forEach(a=>{ 
                const v=[a.i,a.m,a.f].map(x=>parseFloat(x)||0).filter(x=>x>0); 
                if(v.length>0) { sMa+=(v.reduce((s,c)=>s+c,0)/v.length); ca++; } 
            });
            const M_ARC = ca>0 ? (sMa/ca).toFixed(2) : "";
            
            let sMo=0, co=0; 
            Object.values(window._openingsAnime).forEach(o=>{ 
                const so=(parseFloat(o.musica)||0)+(parseFloat(o.animacao)||0); 
                if(so>0) { sMo+=so; co++; } 
            });
            const M_OP = co>0 ? (sMo/co).toFixed(2) : "";
            
            dn.notaInf = M_ARC; dn.notaInfOpenings = M_OP;
            pNotas = { N_INFT: M_ARC, OP: M_OP, "N. A+ e INFT.": JSON.stringify(window._arcosAnime), OPENINGS_INFT: JSON.stringify(window._openingsAnime) };
        }
        
        const N_F = window.calcularNotaFinal(est, document.getElementById("edit_nota_mal").value, document.getElementById("edit_stars").value, dn);
        
        const payload = {
            NOME: n, ESTADO: document.getElementById("edit_estado").value, ESTILO: est, TEMPORADA: document.getElementById("edit_temp").value,
            ANO: document.getElementById("edit_ano").value, ASSIS: document.getElementById("edit_eps_ass").value, TOTAIS: document.getElementById("edit_eps_tot").value,
            IMAGEM: document.getElementById("edit_img").value, N_MAL: document.getElementById("edit_nota_mal").value, STARS: document.getElementById("edit_stars").value,
            ultima_atualizacao: new Date().toISOString(), M_Opening: mop, M_End: med, M_Trilha: mtr, NOTA_F: N_F, ...pNotas
        };
        
        try {
            const u = auth.currentUser; const ck = `animes_${u.uid}`;
            await setDoc(doc(db, "users", u.uid, "animes", n), payload, { merge: true });
            
            const cd = localStorage.getItem(ck);
            if(cd) { 
                let a = JSON.parse(cd); 
                const i = a.findIndex(x=>x.NOME===n); 
                if(i!==-1) a[i]={...a[i],...payload}; else a.push(payload); 
                localStorage.setItem(ck, JSON.stringify(a)); 
            }
            loadAnimeNamesForEdit(); 
                    showToast("Edição salva com sucesso!", "success"); 
            window.limparEdicao();
        } catch(e) { showToast("Erro ao salvar a edição.", "error"); }
    };

    window.calcularNotaFinal = (estilo, mal, stars, dn) => {
        let nota_f = ""; 
        const n_mal_d = (parseFloat(mal)||0)/2; 
        const star_map = { "":0, "0":3, "1":7, "2":8, "3":9, "4":10, "5":10.2, "✶ ✶ ✶":10.3, "✶ ✶":10.4, "✶":10.5 };
        const mal_star_d = (n_mal_d + (star_map[stars]||0))/1.5;
        
        if(estilo==="Anime" && dn.notasAnime && dn.notasOpening) {
            const n_eps_list = dn.notasAnime.eps.map(n => parseFloat(n)).filter(n => !isNaN(n) && n > 0);
            
            const o=dn.notasOpening;
            let n_op = 0;
            if (parseFloat(o.SEM_OP) > 0) n_op = parseFloat(o.SEM_OP); 
            else { 
                const ops = [parseFloat(o.m1),parseFloat(o.a1),parseFloat(o.m2),parseFloat(o.a2),parseFloat(o.m3),parseFloat(o.a3)].filter(n=>n>0); 
                if(ops.length>0) n_op = ops.reduce((s,c)=>s+c,0)/(ops.length/2); 
            }
            
            const ep1 = parseFloat(dn.notasAnime.ep1)||0;
            const epf = parseFloat(dn.notasAnime.epf)||0;
            const pts = [];
            if(ep1>0) pts.push(ep1); pts.push(...n_eps_list); if(epf>0) pts.push(epf); if(n_op>0) pts.push(n_op);
            
            const n_f_1 = pts.length>0 ? pts.reduce((s,c)=>s+c,0)/pts.length : 0;
            
            let bonus_ep = 0; const t = parseInt(dn.TOTAIS)||0;
            if(t>0) { if(t<=15) bonus_ep=0.01; else if(t<=26) bonus_ep=0.02; else bonus_ep=0.03; }
            
            if(n_f_1>0 || mal_star_d>0) nota_f = (((n_f_1 + mal_star_d)/2)+bonus_ep).toFixed(2);
            
        } else if(estilo==="Anime Inf.") {
            const n_arcos = parseFloat(dn.notaInf)||0; 
            const n_ops = parseFloat(dn.notaInfOpenings)||0;
            let n_f_1 = 0;
            if(n_arcos>0 && n_ops>0) n_f_1 = (n_arcos+n_ops)/2; else if(n_arcos>0) n_f_1 = n_arcos; else if(n_ops>0) n_f_1 = n_ops;
            if(n_f_1>0 || mal_star_d>0) nota_f = (((n_f_1 + mal_star_d)/2)+0.04).toFixed(2);
            
        } else if(estilo==="Filme") {
            const n = parseFloat(dn.notaFilme)||0; if(n>0 || mal_star_d>0) nota_f = ((n + mal_star_d)/2).toFixed(2);
        } else if(estilo==="Especial") {
            const n = parseFloat(dn.notaEspecial)||0; if(n>0 || mal_star_d>0) nota_f = ((n + mal_star_d)/2).toFixed(2);
        }
        return nota_f !== "" ? parseFloat(nota_f) : "";
    };

    onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = "index.html"; return; }
        userEmailEl.textContent = user.email;
        setTimeout(() => loadAnimeNamesForEdit(), 200);
    });
</script>
</body>
