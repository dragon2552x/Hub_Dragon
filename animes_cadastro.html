        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --accent-color: #B9314F;
            --bg-dark: #0b0b0b;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #e6e6e6;
            font-family: 'Inter', system-ui, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(185, 49, 79, 0.1), transparent 40%),

        }

        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        
        .glass-panel {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .task-card {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }

        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }

        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            transform: translateX(0); transition: transform 0.3s; z-index: 50;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .main-content { margin-left: 80px; transition: margin-left 0.3s; }
        .main-content.sidebar-hidden { margin-left: 0; }

        /* Pill Buttons */
        .filter-btn {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            padding: 10px 22px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            display: inline-block;
        }
        .filter-btn:hover {
            background: rgba(50, 50, 50, 0.8); color: white; transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.1);
        }
        .filter-btn.active {
            background: var(--accent-color); color: white; border-color: rgba(185, 49, 79, 0.6);
            box-shadow: 0 0 20px rgba(185, 49, 79, 0.5), inset 0 0 10px rgba(0,0,0,0.2); transform: scale(1.05);

    </style>

<script>
    lucide.createIcons();
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
        mainContent.classList.toggle('sidebar-hidden');
    });

    window.toggleMoreOptions = (event) => {
        event.stopPropagation();
        document.getElementById('more-options-dropdown').classList.toggle('hidden');
    }
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('more-options-dropdown');
        const btn = document.getElementById('more-options-btn');

</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsbiLPBOda119Qr6Ji69j8TZLpiFixBWI",
        authDomain: "list-games-9bddd.firebaseapp.com",
        projectId: "list-games-9bddd",
        storageBucket: "list-games-9bddd.firebasestorage.app",
        messagingSenderId: "756898313156",
        appId: "1:756898313156:web:9bc660d0a2f4cd07882a91",
        measurementId: "G-GLM50YVLXP"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    const animeNamesCache =[];
    const userEmailEl = document.getElementById("user-email");

    document.getElementById('logout-btn').onclick = () => {
        if (auth.currentUser) {
            localStorage.removeItem(`animes_${auth.currentUser.uid}`);
            signOut(auth).then(() => window.location.href = 'index.html');
        } else {
            window.location.href = 'index.html';
        }
    };

    async function loadAnimeNamesForCombo() {
        try {
            const user = auth.currentUser;
            if (!user) return;
            const cacheKey = `animes_${user.uid}`;
            const cachedData = localStorage.getItem(cacheKey);
            animeNamesCache.length = 0;
            if (cachedData) {
                JSON.parse(cachedData).forEach(data => { if (data && data.NOME) animeNamesCache.push(data.NOME); });
            } else {
                const snapshot = await getDocs(collection(db, "users", user.uid, "animes"));
                snapshot.forEach(doc => { if (doc.data().NOME) animeNamesCache.push(doc.data().NOME); });
                localStorage.setItem(cacheKey, JSON.stringify(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));
            }
            animeNamesCache.sort((a, b) => a.localeCompare(b));
            setupAutoComplete();
        } catch (err) { console.error(err); }
    }

    function setupAutoComplete() {
        const input = document.getElementById("cad_ult_temp");
        const dropdown = document.getElementById("cad_ult_temp_dropdown");
        const arrow = document.getElementById("cad_ult_temp_arrow");
        if (!input || !dropdown) return;

        function updateDropdown(filterText = "") {
            dropdown.innerHTML = "";
            const results = animeNamesCache.filter(nome => nome.toLowerCase().includes(filterText.toLowerCase()));
            if (!results.length) { dropdown.classList.add("hidden"); return; }
            results.forEach(nome => {
                const option = document.createElement("div");
                option.className = "px-4 py-3 hover:bg-white/10 cursor-pointer text-sm text-gray-200 border-b border-white/5 last:border-0 transition-colors";
                option.textContent = nome;
                option.addEventListener("click", () => { input.value = nome; dropdown.classList.add("hidden"); });
                dropdown.appendChild(option);
            });
            dropdown.classList.remove("hidden");
        }
        input.addEventListener("input", () => updateDropdown(input.value));
        arrow.addEventListener("click", () => {
            dropdown.classList.toggle("hidden");
            if (!dropdown.classList.contains("hidden")) { updateDropdown(""); input.focus(); }
        });
        document.addEventListener("click", (e) => {
            if (!input.contains(e.target) && !arrow.contains(e.target)) dropdown.classList.add("hidden");
        });
    }

    window.limparCampos = () => {
        const ids =["cad_nome", "cad_estilo", "cad_temp", "cad_eps_ass", "cad_eps_tot", "cad_img", "cad_ano", "cad_ult_temp"];
        const chkLimparMedio = document.getElementById("sw_limpar_medio");
        const chkNaoLimpar = document.getElementById("sw_nao_limpar");
        if (chkNaoLimpar?.checked) return;
        if (chkLimparMedio?.checked) {["cad_nome", "cad_eps_tot", "cad_ult_temp", "cad_img"].forEach(id => document.getElementById(id).value = "");
            return;
        }
        ids.forEach(id => document.getElementById(id).value = "");
    };

    window.pegarDoMAL = async () => {
        const nome = document.getElementById("cad_nome").value.trim();
        if (!nome) { alert("Digite o nome do anime antes!"); return; }
        try {
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(nome)}&limit=1`);
            const data = await res.json();
            if (!data.data?.length) { alert("Anime não encontrado no MAL!"); return; }
            const anime = data.data[0];
            document.getElementById("cad_img").value = anime.images?.jpg?.image_url || "";
            document.getElementById("cad_eps_tot").value = anime.episodes > 0 ? anime.episodes : "";
            document.getElementById("cad_ano").value = anime.aired?.prop?.from?.year || "";
            const season = anime.season?.toLowerCase() || "";
            const tempMap = { "winter": "Inverno (1)", "spring": "Primavera (4)", "summer": "Verão (7)", "fall": "Outono (10)" };
            document.getElementById("cad_temp").value = tempMap[season] || "Outro";
            alert("Dados preenchidos do MyAnimeList! 🎉");
        } catch (e) { alert("Erro ao buscar no MyAnimeList."); }
    };

    window.verificarSerie = () => {
        const contNome = document.getElementById("cad_ult_temp").value.trim();
        const user = auth.currentUser;
        if (!contNome) {
            const input = document.getElementById("cad_ult_temp");
            input.classList.add("border-red-500");
            setTimeout(() => input.classList.remove("border-red-500"), 2000);
            return;
        }
        const cached = localStorage.getItem(`animes_${user.uid}`);
        if (!cached) return;
        const todos = JSON.parse(cached);
        const base = todos.find(a => a.NOME.toLowerCase() === contNome.toLowerCase());
        if (!base) { alert("Anime base não encontrado."); return; }
        
        const animesDaSerie = todos.filter(a => a.SERIE === base.SERIE).sort((a, b) => (parseFloat(a.Num) || 0) - (parseFloat(b.Num) || 0));
        const container = document.getElementById("lista-serie-conteudo");
        container.innerHTML = "";
        
        animesDaSerie.forEach(anime => {
            const item = document.createElement("div");
            item.className = "flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-colors border border-transparent hover:border-white/10";
            item.innerHTML = `
                <span class="bg-accent text-white text-xs font-bold px-2.5 py-1 rounded-lg shadow-md shrink-0">${anime.Num || '0'}</span>
                <div class="flex flex-col min-w-0">
                    <span class="text-white font-bold text-sm truncate">${anime.NOME}</span>
                    <span class="text-gray-400 text-[10px] uppercase font-semibold">${anime.ESTILO || '-'} • ${anime.ANO || '-'} • ${anime.TEMPORADA || ''}</span>
                </div>
            `;
            item.onclick = () => { document.getElementById("cad_ult_temp").value = anime.NOME; fecharModalSerie(); };
            container.appendChild(item);
        });
        document.getElementById("modal-serie").classList.remove("hidden");
    };

    window.fecharModalSerie = () => document.getElementById("modal-serie").classList.add("hidden");
    document.getElementById("modal-serie").addEventListener("click", e => { if (e.target.id === "modal-serie") window.fecharModalSerie(); });

    window.cadastrarAnime = async () => {
        const nome = document.getElementById("cad_nome").value.trim();
        const estilo = document.getElementById("cad_estilo").value;
        const temp = document.getElementById("cad_temp").value;
        const epsAssist = parseInt(document.getElementById("cad_eps_ass").value || 0);
        const epsTotal = parseInt(document.getElementById("cad_eps_tot").value || 0);
        const imagem = document.getElementById("cad_img").value.trim();
        const ano = parseInt(document.getElementById("cad_ano").value || 0);
        const contNome = document.getElementById("cad_ult_temp").value.trim();

        if (!nome || !estilo || !temp || !ano || !imagem) { alert("Preencha todos os campos obrigatórios!"); return; }

        const user = auth.currentUser;
        const cacheKey = `animes_${user.uid}`;
        let todosAnimes = JSON.parse(localStorage.getItem(cacheKey) || "[]");

        let Num = 0, SERIE = 0, tipo = "";
        if (!contNome) {
            const maiorN = todosAnimes.length > 0 ? Math.max(...todosAnimes.map(a => Math.floor(a.Num))) : 0;
            SERIE = maiorN + 1; Num = parseFloat((SERIE + 0.01).toFixed(2)); tipo = "NEW";
        } else {
            const baseAnime = todosAnimes.find(a => a.NOME === contNome);
            if (!baseAnime) { alert("Selecione corretamente o anime base da continuação!"); return; }
            tipo = "CONT."; SERIE = Math.floor(baseAnime.Num);
            const qtdNaSerie = todosAnimes.filter(a => Math.floor(a.Num) === SERIE).length;
            Num = parseFloat((SERIE + (qtdNaSerie + 1) * 0.01).toFixed(2));
        }

        const estado = estilo === "Filme" || estilo === "Especial" ? "N. Assistido" : "N. Começado";
        const novoAnime = {
            Num, NOME: nome, ESTADO: estado, ESTILO: estilo, TIPO: tipo, TOTAIS: epsTotal, ASSIS: epsAssist, TEMPORADA: temp,
            ANO: ano, NOTA_F: 0, STARS: "", N_MAL: 0, OP: 0, OPENING: "", IMAGEM: imagem, SERIE: SERIE.toString(),
            ultima_atualizacao: new Date().toISOString()
        };

        try {
            await setDoc(doc(db, "users", user.uid, "animes", nome), novoAnime);
            todosAnimes.push(novoAnime);
            localStorage.setItem(cacheKey, JSON.stringify(todosAnimes));
            loadAnimeNamesForCombo();
            
            const ultTab = document.getElementById("cad_ultimos");
            const linha = document.createElement("tr");
            linha.className = "hover:bg-white/5 transition-colors";
            linha.innerHTML = `<td class="px-4 py-3 text-white font-medium">${nome}</td><td class="px-4 py-3 text-center text-gray-400">${ano}</td><td class="px-4 py-3 text-center text-gray-400">${temp}</td>`;
            ultTab.prepend(linha);
            if (ultTab.children.length > 5) ultTab.lastChild.remove();
            
            alert("Anime cadastrado!");
            window.limparCampos();
        } catch (e) { alert("Erro ao salvar no banco de dados."); }
    };

    onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = "index.html"; return; }
        userEmailEl.textContent = user.email;
        setTimeout(() => loadAnimeNamesForCombo(), 200);
    });
</script>
</body>
