<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="referrer" content="no-referrer">
    
    <title>Class Animes — Estrelas — My Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        /* Configurações Base */
        :root {
            --accent-color: #B9314F;
            --bg-dark: #0b0b0b;
            --bg-panel: #151515;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #e6e6e6;
            font-family: 'Inter', system-ui, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(185, 49, 79, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(20, 20, 20, 1), transparent 40%);
            min-height: 100vh;
            user-select: none;
        }

        /* Utilitários de Estilo */
        .text-accent { color: var(--accent-color); }
        .bg-accent { background-color: var(--accent-color); }
        
        /* Painéis translúcidos */
        .glass-panel {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Cards com efeito Xbox */
        .task-card {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
        }
        .task-card:hover {
            transform: translateY(-4px);
            background: rgba(40, 40, 40, 0.6);
            border-color: rgba(185, 49, 79, 0.3);
            box-shadow: 0 12px 24px -5px rgba(0, 0, 0, 0.6), 0 0 15px rgba(185, 49, 79, 0.1);
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }

        /* Sidebar retrátil */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            transform: translateX(0); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 50;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .main-content { margin-left: 80px; transition: margin-left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .main-content.sidebar-hidden { margin-left: 0; }
        .toggle-sidebar-btn { transition: all 0.3s; }
        .toggle-sidebar-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(185, 49, 79, 0.4); }

        /* ======== FILTROS MODERNOS (PILL BUTTONS) ======== */
        .filter-btn {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            padding: 10px 22px;
            border-radius: 9999px; /* Formato pílula */
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            outline: none;
        }
        .filter-btn:hover {
            background: rgba(50, 50, 50, 0.8);
            color: white;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .filter-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: rgba(185, 49, 79, 0.6);
            box-shadow: 0 0 20px rgba(185, 49, 79, 0.5), inset 0 0 10px rgba(0,0,0,0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR RETRÁTIL -->
    <aside id="sidebar" class="sidebar flex flex-col w-20 bg-[#121212] border-r border-white/10 items-center py-6 flex-shrink-0 glass-panel">
        <div class="text-accent mb-8">
            <i data-lucide="sparkle" class="w-10 h-10"></i>
        </div>
        
        <nav class="flex flex-col gap-3 md:gap-6 items-center flex-1">
            <a href="home.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Home">
                <i data-lucide="home" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="games_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Games">
                <i data-lucide="gamepad-2" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="animes_manager.html" class="text-accent p-1.5 md:p-2 bg-white/5 rounded-xl" title="Animes">
                <i data-lucide="tv" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="cards_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Cards/Molduras/Bg">
                <i data-lucide="layers" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="hqs_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="HQs">
                <i data-lucide="book-open-text" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="manga_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Mangás">
                <i data-lucide="notebook-text" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="manhwa_manager.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Manhwas">
                <i data-lucide="smartphone" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="academia_exercicios.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="Academia">
                <i data-lucide="dumbbell" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>

            <a href="to_do.html" class="text-gray-500 hover:text-gray-200 p-1.5 md:p-2 hover:bg-white/5 rounded-xl transition" title="To Do">
                <i data-lucide="check-square" class="w-5 h-5 md:w-7 md:h-7"></i>
            </a>
        </nav>

        <button id="logout-btn" class="mt-auto text-red-500 hover:text-red-400 p-1.5 md:p-2 hover:bg-red-500/10 rounded-xl transition" title="Sair">
            <i data-lucide="log-out" class="w-5 h-5 md:w-7 md:h-7"></i>
        </button>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="main-content" class="main-content flex-1 flex flex-col overflow-hidden relative">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center p-6 md:px-8 bg-transparent z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button id="toggle-sidebar" class="toggle-sidebar-btn p-2 bg-white/5 hover:bg-white/10 rounded-xl text-gray-400 hover:text-accent transition" title="Mostrar/Ocultar Menu">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                
                <div>
                    <h2 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                        <i data-lucide="tv" class="text-accent"></i> My Animes
                    </h2>
                </div>
            </div>
            
            <div class="hidden sm:block text-sm text-gray-400 bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                Usuário: <span id="user-email" class="text-accent font-mono font-bold">...</span>
            </div>
        </header>

        <!-- ÁREA DE CONTEÚDO (SCROLL) -->
        <div id="app" class="flex-1 overflow-y-auto p-6 md:px-8 pb-28">
            <div class="max-w-7xl mx-auto space-y-6">
                
                <!-- FILTROS DE ESTRELAS -->
                <section class="overflow-x-auto whitespace-nowrap pb-4 flex gap-3 custom-scrollbar px-1 py-2 items-center" id="stars-filter">
                    <!-- Botões criados dinamicamente via JS -->
                </section>

                <!-- GRID DE ANIMES -->
                <main id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-5"></main>

                <!-- MENSAGEM VAZIA -->
                <div id="empty-msg" class="text-center text-gray-500 mt-12 text-sm sm:text-lg font-semibold bg-white/5 py-8 sm:py-12 rounded-2xl border border-white/5 border-dashed">
                    <i data-lucide="mouse-pointer-click" class="w-8 h-8 sm:w-10 sm:h-10 mx-auto mb-3 opacity-50 text-accent"></i>
                    Escolha uma categoria de estrelas acima para visualizar!
                </div>

            </div>
        </div>
    </main>

    <!-- NAV INFERIOR FLUTUANTE -->
    <nav class="fixed bottom-0 left-0 w-full bg-[#0b0b0b]/95 backdrop-blur-xl border-t border-white/10 px-2 py-1.5 sm:py-2 sm:py-4 flex justify-between sm:justify-center items-center gap-1 sm:gap-4 z-[999] shadow-[0_-15px_40px_rgba(0,0,0,0.8)] pb-[calc(env(safe-area-inset-bottom)+0.25rem)]">
        <a href="animes_manager.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">Edição</span></a>
        <a href="animes_cadastro.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="file-edit" class="w-4 h-4"></i> <span class="hidden sm:inline">Cadastro</span></a>
        <a href="animes_edicao.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="pencil-ruler" class="w-4 h-4"></i> <span class="hidden sm:inline">Edição</span></a>
        <a href="animes_lista.html" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2"><i data-lucide="list" class="w-4 h-4"></i> <span class="hidden sm:inline">Lista</span></a>
        
        <div class="relative flex">
            <button id="more-options-btn" class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2" onclick="toggleMoreOptions(event)">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i> <span class="hidden sm:inline">Mais</span>
            </button>
            <div id="more-options-dropdown" class="absolute bottom-full mb-2 right-0 w-48 glass-panel border border-white/10 rounded-2xl shadow-2xl p-2 hidden z-50 flex-col gap-1">
                <a href="animes_classificacoes.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="bar-chart-2" class="w-4 h-4 text-accent"></i> Classificação</a>
                <a href="animes_estrelas.html" class="w-full text-left px-4 py-2.5 text-sm bg-white/10 text-white rounded-xl transition-colors flex items-center gap-3 font-bold border border-white/5"><i data-lucide="star" class="w-4 h-4 text-accent fill-current"></i> Estrelas</a>
                <a href="animes_torneio.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="trophy" class="w-4 h-4 text-accent"></i> Torneio</a>
                <a href="animes_serie.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="layers" class="w-4 h-4 text-accent"></i> Série</a>
                <a href="animes_database.html" class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white rounded-xl transition-colors flex items-center gap-3 font-semibold"><i data-lucide="database" class="w-4 h-4 text-accent"></i> DataBase</a>
            </div>
        </div>
    </nav>

<script>
    lucide.createIcons();
    
    // Toggle Sidebar
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    const toggleBtn = document.getElementById('toggle-sidebar');
    
    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
        mainContent.classList.toggle('sidebar-hidden');
    });

    // Dropdown Logic
    window.toggleMoreOptions = (event) => {
        event.stopPropagation();
        document.getElementById('more-options-dropdown').classList.toggle('hidden');
    }

    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('more-options-dropdown');
        const btn = document.getElementById('more-options-btn');
        if (dropdown && !dropdown.contains(e.target) && !btn.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsbiLPBOda119Qr6Ji69j8TZLpiFixBWI",
        authDomain: "list-games-9bddd.firebaseapp.com",
        projectId: "list-games-9bddd",
        storageBucket: "list-games-9bddd.firebasestorage.app",
        messagingSenderId: "756898313156",
        appId: "1:756898313156:web:9bc660d0a2f4cd07882a91",
        measurementId: "G-GLM50YVLXP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const userEmailEl = document.getElementById("user-email");
    const gridEl = document.getElementById("anime-grid");
    const emptyMsg = document.getElementById("empty-msg");
    const starsFilterEl = document.getElementById("stars-filter");

    let allAnimes =[];
    let selectedStars = null; // null = mostrar a mensagem padrão

    const starOptions =[
        { label: "🥇 R1", value: "✶" },
        { label: "🥈 R2", value: "✶ ✶" },
        { label: "🥉 R3", value: "✶ ✶ ✶" },
        { label: "5 ⭐", value: 5 },
        { label: "4 ⭐", value: 4 },
        { label: "3 ⭐", value: 3 },
        { label: "2 ⭐", value: 2 },
        { label: "1 ⭐", value: 1 },
        { label: "0 ⭐", value: 0 },
        { label: "Sem ⭐", value: "" }
    ];

    document.getElementById('logout-btn').onclick = () => {
        if (auth.currentUser) {
            localStorage.removeItem(`animes_${auth.currentUser.uid}`);
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        } else {
            window.location.href = 'index.html';
        }
    };

    function renderStarsFilter() {
        starsFilterEl.innerHTML = starOptions.map(opt => `
            <button class="filter-btn ${selectedStars === opt.value ? "active" : ""}"
                    data-value="${opt.value}">
                ${opt.label}
            </button>
        `).join("");

        starsFilterEl.querySelectorAll("button").forEach(btn => {
            btn.onclick = () => {
                let value = btn.dataset.value;

                if (value === "") {
                    selectedStars = "";
                }
                else if (["✶", "✶ ✶", "✶ ✶ ✶"].includes(value)) {
                    selectedStars = value;
                }
                else {
                    selectedStars = Number(value);
                }

                renderStarsFilter();
                renderGrid();
            };
        });
    }

    function animeCard(anime) {
        const defaultImg = 'https://via.placeholder.com/300x450?text=Sem+Imagem';
        return `
            <div class="task-card rounded-2xl overflow-hidden flex flex-col relative group h-full">
                <!-- Badge de Estrelas -->
                <div class="absolute top-2 right-2 z-10 text-xs px-2.5 py-1 rounded-lg bg-accent text-white font-bold shadow-lg border border-white/20">
                    ${anime.STARS || "-"}
                </div>
                
                <!-- Imagem com Overlay -->
                <div class="w-full aspect-[2/3] bg-black/50 relative overflow-hidden border-b border-white/5 shrink-0">
                    <img src="${anime.IMAGEM || defaultImg}" alt="${anime.NOME}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </div>
                
                <!-- Dados Inferiores -->
                <div class="p-3 sm:p-4 flex-1 flex flex-col gap-2">
                    <h3 class="font-bold text-white text-sm sm:text-base line-clamp-1" title="${anime.NOME}">${anime.NOME}</h3>
                    
                    <div class="grid grid-cols-2 gap-x-2 gap-y-1 text-[10px] sm:text-xs">
                        <div class="text-gray-400"><span class="font-semibold text-gray-500">Nota:</span> <span class="text-white">${Number(anime.NOTA_F).toFixed(2)}</span></div>
                        <div class="text-gray-400"><span class="font-semibold text-gray-500">MAL:</span> <span class="text-white">${anime.N_MAL || "-"}</span></div>
                        <div class="text-gray-400 truncate"><span class="font-semibold text-gray-500">Estado:</span> <span class="text-white">${anime.ESTADO || "-"}</span></div>
                        <div class="text-gray-400"><span class="font-semibold text-gray-500">Ano:</span> <span class="text-white">${anime.ANO || "-"}</span></div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderGrid() {
        let filtered = [...allAnimes];

        if (selectedStars === null) {
            gridEl.innerHTML = "";
            emptyMsg.classList.remove("hidden");
            return;
        }

        if (["✶", "✶ ✶", "✶ ✶ ✶"].includes(selectedStars)) {
            filtered = filtered.filter(a => a.STARS === selectedStars);
        } else if (selectedStars === "") {
            filtered = filtered.filter(a => a.STARS === "" || a.STARS == null);
        } else if (selectedStars === 0) {
            filtered = filtered.filter(a => a.STARS === 0 || a.STARS === "0");
        } else if (!isNaN(selectedStars)) {
            filtered = filtered.filter(a => Number(a.STARS) === Number(selectedStars));
        }

        gridEl.innerHTML = filtered.map(animeCard).join("");
        emptyMsg.classList.toggle("hidden", filtered.length > 0);
        lucide.createIcons();
    }

    async function loadAnimes(userId) {
        const cacheKey = `animes_${userId}`;
        const cachedData = localStorage.getItem(cacheKey);

        if (cachedData) {
            allAnimes = JSON.parse(cachedData);
            gridEl.innerHTML = "";
            emptyMsg.classList.remove("hidden");
        } 
        else {
            const ref = collection(db, "users", userId, "animes");
            const snap = await getDocs(ref);
            
            allAnimes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            localStorage.setItem(cacheKey, JSON.stringify(allAnimes));
            
            gridEl.innerHTML = "";
            emptyMsg.classList.remove("hidden");
        }
    }

    onAuthStateChanged(auth, user => {
        if (user) {
            userEmailEl.textContent = user.email || user.uid;
            renderStarsFilter();
            loadAnimes(user.uid);
        } else {
            window.location.href = "index.html";
        }
    });
</script>

</body>
</html>
